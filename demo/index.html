<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docuSnap — Document Capture Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── Page wrapper: single centred column ─── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 10px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #00d9ff;
      font-size: 1.3em;
    }

    /* ─────────────────── Video ─────────────────── */
    .video-wrap {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      /* portrait: cap height so it doesn't eat the whole screen */
      max-height: 55dvh;
    }

    /* Landscape: size the canvas by height (not width) so the full video
       fits in the viewport without overflow:hidden clipping it.
       width:auto + max-height uses the canvas intrinsic aspect ratio. */
    @media (orientation: landscape) and (min-width: 600px) {
      .video-wrap {
        max-height: 90dvh;
        width: fit-content;   /* shrink-wrap around the height-driven canvas */
        margin: 0 auto;
      }
      #canvas {
        width: auto;
        max-height: 88dvh;    /* canvas scales to fit viewport height */
        max-width: 100vw;
      }
    }

    #video   { display: none; }
    #canvas  {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ─────────────────── Instruction banner ─────────────────── */
    #instructionBanner {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.70);
      color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 12px 28px;
      border-radius: 26px;
      white-space: nowrap;
      pointer-events: none;
      max-width: 90%; text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 5;
    }
    #instructionBanner.visible { opacity: 1; }

    /* ─────────────────── Face badge (overlay) ─────────────────── */
    #faceBadge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px; font-weight: 600;
      display: none;
      pointer-events: none;
    }
    #faceBadge.present { color: #2ed573; }
    #faceBadge.absent  { color: #ff4757; }
    #faceBadge.unknown { color: #aaa;    }

    /* ─────────────────── API wait popup ─────────────────── */
    #apiWaitPopup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 16px 28px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 100; display: none; text-align: center;
      backdrop-filter: blur(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #apiWaitPopup .api-spin { margin-right: 8px; }

    /* ─────────────────── Shutter flash overlay ─────────────────── */
    #shutterFlash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      border-radius: 12px;
    }
    @keyframes shutterFlash {
      0%   { opacity: 0; }
      12%  { opacity: 0.92; }
      100% { opacity: 0; }
    }
    #shutterFlash.active {
      animation: shutterFlash 0.9s ease-out forwards;
    }

    /* ─────────────────── Controls ─────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      padding: 10px 18px;
      border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:hover   { transform: scale(1.02); }
    button:active  { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #startBtn    { background: #00d9ff; color: #000; }
    #stopBtn     { background: #ff4757; color: #fff; }
    #captureBtn  { background: #2ed573; color: #000; display: none; }

    /* ─────────────────── Side step indicator ─────────────────── */
    #sideSteps {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: 10px;
      padding: 14px 24px;
      background: #0f0f23;
      border-radius: 10px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 3px solid #555;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .step-dot.active { border-color: #00d9ff; background: #00d9ff; box-shadow: 0 0 10px #00d9ff88; }
    .step-dot.done   { border-color: #2ed573; background: #2ed573; }
    .step-lbl {
      font-size: 22px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 0.06em;
      transition: color 0.3s;
    }
    .step-lbl.active { color: #00d9ff; }
    .step-lbl.done   { color: #2ed573; }
    .step-connector {
      width: 80px; height: 3px;
      background: #333;
      margin: 0 14px;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .step-connector.done { background: #2ed573; }

    /* ─────────────────── Two-up result (both sides captured) ─────────────────── */
    .two-up {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .two-up-col {
      background: #0f0f23;
      border-radius: 8px;
      overflow: hidden;
    }
    .two-up-img  { display: block; width: 100%; height: auto; }
    .two-up-lbl  {
      text-align: center;
      padding: 4px 6px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: #666;
      background: #0a0a18;
    }
    .two-up-quality {
      padding: 4px 5px;
      display: flex; flex-wrap: wrap; gap: 3px;
      background: #0a0a18;
      border-top: 1px solid #16213e;
    }

    /* ─────────────────── Real-time quality panel ─────────────────── */
    .quality-panel {
      margin-top: 10px;
      padding: 12px;
      background: #16213e;
      border-radius: 10px;
    }

    .qp-header {
      text-align: center;
      margin-bottom: 6px;
    }
    .qp-label { display: block; color: #888; font-size: 14px; }
    .qp-score { display: block; font-size: 16px; font-weight: bold; margin-top: 6px; }

    /* auto-fit grid: all items on one row when space allows, wraps on narrow screens */
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 5px;
      margin-top: 8px;
    }

    /* Face row is just a normal grid item (no forced spanning) */
    #faceIndicatorRow {
      display: none;   /* revealed by JS — must set to 'flex' not '' to override this */
    }

    .indicator {
      display: flex;
      align-items: center;
      background: #0f0f23;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      transition: opacity 0.3s;
    }
    .ind-label  { flex: 1; color: #888; font-size: 11px; }
    .ind-value  { width: 46px; text-align: right; font-family: monospace; color: #fff; font-size: 11px; }
    .ind-status { margin-left: 5px; font-size: 11px; line-height: 1; }

    /* ── Inactive state: document not yet detected ── */
    /* Dims all indicators; score shows search message */
    .quality-grid.inactive .indicator {
      opacity: 0.3;
      pointer-events: none;
    }
    /* ─────────────────── Hint box ─────────────────── */
    #hintBox {
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: rgba(255,71,87,0.15);
      border-left: 3px solid #ff4757;
      display: none;
    }
    #hintBox.good    { background: rgba(46,213,115,0.15); border-left-color: #2ed573; }
    #hintBox.neutral { background: rgba(0,217,255,0.12);  border-left-color: #00d9ff; }

    /* ─────────────────── Settings panel ─────────────────── */
    .settings-panel {
      margin-top: 8px;
      font-size: 12px;
    }
    .settings-panel > summary {
      cursor: pointer;
      color: #00d9ff;
      padding: 6px 2px;
      user-select: none;
    }
    .settings-panel > summary::-webkit-details-marker { color: #00d9ff; }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .config-grid label {
      display: flex; flex-direction: column; gap: 3px;
      color: #888; font-size: 11px;
    }
    .config-grid select,
    .config-grid input {
      padding: 6px;
      border: 1px solid #333; border-radius: 4px;
      background: #0f0f23; color: #fff;
      font-size: 12px; width: 100%;
    }
    .config-btn {
      margin-top: 10px; width: 100%;
      padding: 8px;
      background: #00d9ff; color: #000;
      border: none; border-radius: 4px;
      cursor: pointer; font-weight: bold; font-size: 12px;
    }
    .config-btn:hover { background: #00c4e6; }

    /* ─────────────────── Section shared styles ─────────────────── */
    .section-title {
      color: #00d9ff;
      font-size: 1.05em; font-weight: 600;
      margin-bottom: 8px;
      text-align: center;        /* centered as requested */
    }

    /* ─────────────────── Captured Document ─────────────────── */
    .captured-section { margin-top: 18px; }

    .captured-card {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
    }

    #result {
      background: #0f0f23;
      border-radius: 8px;
      min-height: 90px;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 13px;
      overflow: hidden;
    }
    #result img {
      width: 100%; height: auto;
      display: block; border-radius: 6px;
    }

    #capturedTabs {
      display: none;   /* flex when capture available */
      gap: 6px;
      margin-top: 8px;
      justify-content: center;
    }
    .tab-btn {
      padding: 5px 14px;
      border: 1px solid #333; border-radius: 4px;
      background: #0f0f23; color: #aaa;
      font-size: 12px; cursor: pointer;
    }
    .tab-btn.active { background: #00d9ff; color: #000; border-color: #00d9ff; }

    /* Captured quality — same auto-fit grid as live quality */
    #capturedQuality {
      display: none;   /* grid when capture available */
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 4px;
      margin-top: 8px;
    }

    .cap-ind {
      display: flex; align-items: center;
      background: #0f0f23;
      padding: 4px 8px; border-radius: 4px;
      font-size: 11px;
    }
    .cap-ind .ind-label  { flex: 1; color: #888; }
    .cap-ind .ind-value  { width: 46px; text-align: right; font-family: monospace; color: #fff; }
    .cap-ind .ind-status { margin-left: 5px; font-size: 11px; }

    /* ─────────────────── Capture History ─────────────────── */
    .history-section {
      margin-top: 22px;
      padding-bottom: 24px;
    }
    .history-divider {
      border: none;
      border-top: 1px solid #2a2a44;
      margin-bottom: 14px;
    }
    #historyList { display: flex; flex-direction: column; gap: 10px; }
    .history-empty {
      color: #555; font-size: 12px;
      text-align: center; padding: 16px 0;
    }

    /*
     * History card: image fills full width by default (narrow / portrait).
     * On wider screens (≥ 520 px) the image sits left (~55 %) and the
     * meta/badges column sits to its right so the card stays compact.
     */
    .history-item {
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;           /* clips image corners */
      display: flex;
      flex-direction: column;     /* image on top, info below on narrow */
    }

    @media (min-width: 520px) {
      .history-item {
        flex-direction: row;      /* image left, info right on wider screens */
        align-items: stretch;
      }
    }

    /* Image fills full width in column layout */
    .history-img-wrap {
      flex-shrink: 0;
      background: #0f0f23;
    }
    .history-img-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .history-img-wrap .no-thumb {
      display: flex; align-items: center; justify-content: center;
      min-height: 80px;
      color: #444; font-size: 11px;
    }
    /* Paired thumbnails for 2-side captures */
    .history-img-pair {
      display: flex; gap: 2px;
    }
    .history-side {
      flex: 1; min-width: 0; position: relative;
    }
    .history-side img {
      display: block; width: 100%; height: auto;
    }
    .history-side-lbl {
      position: absolute; bottom: 2px; left: 0; right: 0;
      text-align: center; font-size: 9px; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(0,0,0,0.5); padding: 1px 0;
    }

    /* On wide screens, constrain image column to ~55 % */
    @media (min-width: 520px) {
      .history-img-wrap {
        width: 55%;
        max-width: 55%;
      }
      .history-img-wrap img { height: 100%; object-fit: cover; }
    }

    /* Info column: timestamp + badges */
    .history-info {
      flex: 1; min-width: 0;
      padding: 8px 10px;
    }
    .history-ts { color: #666; font-size: 10px; margin-bottom: 6px; }
    .history-badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .hbadge {
      font-size: 10px; padding: 2px 6px;
      border-radius: 3px; background: #0f0f23; white-space: nowrap;
      color: #888;
    }
    .hbadge .hb-val       { color: #2ed573; }
    .hbadge.fail .hb-val  { color: #ff4757; }
    .hbadge.neutral .hb-val { color: #aaa; }

    /* ─────────────────── External API actions ─────────────────── */
    #apiActions {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .api-btn-row {
      display: flex; gap: 6px;
      justify-content: center; flex-wrap: nowrap;
    }
    .api-btn {
      padding: 7px 12px;
      border: none; border-radius: 6px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: transform 0.1s, opacity 0.2s;
      display: inline-flex; align-items: center; gap: 4px;
      white-space: nowrap; flex: 1; justify-content: center;
    }
    .api-btn:hover   { transform: scale(1.02); }
    .api-btn:active  { transform: scale(0.97); }
    .api-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .api-btn-liveness { background: #2980b9; color: #fff; }
    .api-btn-ocr      { background: #2980b9; color: #fff; }
    .api-btn-guru     { background: #2980b9; color: #fff; }

    /* One-line API result row — same grid as quality indicators */
    #apiResultsRow {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 4px;
      padding: 6px 0;
      border-top: 1px solid #1e2a4a;
    }
    .api-cell {
      display: flex; align-items: center;
      background: #0f0f23;
      padding: 5px 8px; border-radius: 4px;
      font-size: 12px;
    }
    .api-cell-lbl { flex: 1; color: #888; font-size: 11px; }
    .api-cell-val { width: 52px; text-align: right; font-family: monospace; color: #fff; font-size: 11px; }
    .api-cell-status { margin-left: 5px; font-size: 11px; line-height: 1; }
    .api-cell-val.green { color: #2ed573; }
    .api-cell-val.red   { color: #ff4757; }
    .api-cell-val.amber { color: #ffa502; }

    /* OCR details panel */
    #ocrDetails, #guruDetails {
      display: none;
      background: #0f0f23;
      border-radius: 8px;
      padding: 10px 12px;
    }
    #ocrDetails  { border-top: 2px solid #2980b9; }
    #guruDetails { border-top: 2px solid #e67e22; }
    .guru-hdr {
      color: #e67e22; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .ocr-hdr {
      color: #2980b9; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .ocr-fields {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3px 10px;
    }
    .ocr-key { color: #666; font-size: 10px; white-space: nowrap; }
    .ocr-val { color: #e0e0e0; font-size: 11px; font-family: monospace; word-break: break-all; }

    /* History extras (liveness + OCR badges in history cards) */
    .hbadge-ocr   { background: rgba(41,128,185,0.18); color: #5dade2; }
    .hbadge-live  { background: rgba(155,89,182,0.18); }
    .history-ocr  {
      margin-top: 6px; font-size: 10px; color: #888;
      font-style: italic; word-break: break-all;
    }

    /* Spinner */
    .api-spin {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    /* ─────────────────── Loading ─────────────────── */
    .loading { text-align: center; padding: 40px; }
    .loading-spinner {
      border: 4px solid #333;
      border-top: 4px solid #00d9ff;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ─────────────────── Fallback / file mode ─────────────────── */
    .video-wrap.fallback-mode {
      background: transparent;
      border-radius: 0;
      overflow: visible;
      max-height: none;
    }
    #fallbackContainer {
      width: 100%;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 24px 16px; gap: 14px;
    }
    .docusnap-fallback-btn {
      width: 100%; max-width: 300px;
      padding: 14px 24px;
      background: #00d9ff; color: #000;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-family: inherit;
    }
    .docusnap-fallback-btn:hover  { transform: scale(1.02); }
    .docusnap-fallback-btn:active { transform: scale(0.98); }
    .docusnap-fallback-btn-secondary {
      background: #2a2a44; color: #ccc; border: 1px solid #444;
    }
    .docusnap-fallback-status {
      color: #ccc; font-size: 13px;
      text-align: center; padding: 0 10px;
      min-height: 18px; line-height: 1.4;
    }
    .docusnap-fallback-preview { width: 100%; max-width: 380px; }
    .docusnap-fallback-preview img {
      width: 100%; height: auto;
      border-radius: 8px; border: 2px solid #2a2a44; display: block;
    }
    .docusnap-fallback-actions {
      display: flex; flex-direction: column;
      align-items: center;
      width: 100%; max-width: 300px; gap: 8px;
    }
    .docusnap-fallback-loading {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px; padding: 30px;
    }
    .docusnap-fallback-spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a44; border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .docusnap-fallback-loading-text { color: #888; font-size: 13px; }
  </style>
</head>
<body>
<div class="page">
  <h1>📄 docuSnap - ID Capture SDK</h1>

  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <p>Initialising…</p>
  </div>

  <div id="app" style="display:none;">

    <!-- ══ Video preview ══ -->
    <div class="video-wrap" id="videoContainer">
      <video id="video" playsinline></video>
      <canvas id="canvas" width="640" height="480"></canvas>
      <div id="fallbackContainer" style="display:none;"></div>
      <div id="instructionBanner"></div>
      <div id="faceBadge">👤 –</div>
      <div id="shutterFlash"></div>
    </div>
    <div id="apiWaitPopup"></div>

    <!-- ══ Controls — always directly beneath video ══ -->
    <div class="controls">
      <button id="startBtn">▶ Start Detection</button>
      <button id="stopBtn"    disabled>⏹ Stop Detection</button>
      <!-- captureBtn: hidden by default; only shown in Manual mode -->
      <button id="captureBtn" disabled>📸 Capture</button>
    </div>

    <!-- Step indicator for multi-side scanning — populated + driven by frame.sideIndex -->
    <div id="sideSteps"></div>

    <!-- ══ Real-time quality panel ══ -->
    <div class="quality-panel">
      <div class="qp-header">
        <span class="qp-label">Real-time quality assessment</span>
        <span class="qp-score" id="score">–</span>
      </div>
      <div id="hintBox"></div>
      <div class="quality-grid">
        <div class="indicator">
          <span class="ind-label">Sharpness</span>
          <span class="ind-value"  id="indSharpness">–</span>
          <span class="ind-status" id="indSharpnessStatus">⚪</span>
        </div>
        <div class="indicator">
          <span class="ind-label">Brightness</span>
          <span class="ind-value"  id="indBrightness">–</span>
          <span class="ind-status" id="indBrightnessStatus">⚪</span>
        </div>
        <div class="indicator">
          <span class="ind-label">Glare</span>
          <span class="ind-value"  id="indGlare">–</span>
          <span class="ind-status" id="indGlareStatus">⚪</span>
        </div>
        <div class="indicator">
          <span class="ind-label">Doc Size</span>
          <span class="ind-value"  id="indDocSize">–</span>
          <span class="ind-status" id="indDocSizeStatus">⚪</span>
        </div>
        <!-- Face row: spans both columns; shown when face detection active -->
        <div class="indicator" id="faceIndicatorRow">
          <span class="ind-label">Face Present</span>
          <span class="ind-value"  id="indFace">–</span>

<script src="../src/docusnap.js?v=17"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
});

// ── DOM refs ──────────────────────────────────────────────────────────────
const video             = document.getElementById('video');
const canvas            = document.getElementById('canvas');
const result            = document.getElementById('result');
const capturedTabs      = document.getElementById('capturedTabs');
const tabFull           = document.getElementById('tabFull');
const tabDoc            = document.getElementById('tabDoc');
const capturedQualityEl = document.getElementById('capturedQuality');
const sideSteps         = document.getElementById('sideSteps');
const scoreEl           = document.getElementById('score');
const hintBox           = document.getElementById('hintBox');
const banner            = document.getElementById('instructionBanner');
const faceBadge         = document.getElementById('faceBadge');
const historyListEl     = document.getElementById('historyList');

const indSharpness        = document.getElementById('indSharpness');
const indSharpnessStatus  = document.getElementById('indSharpnessStatus');
const indBrightness       = document.getElementById('indBrightness');
const indBrightnessStatus = document.getElementById('indBrightnessStatus');
const indGlare            = document.getElementById('indGlare');
const indGlareStatus      = document.getElementById('indGlareStatus');
const indDocSize          = document.getElementById('indDocSize');
const indDocSizeStatus    = document.getElementById('indDocSizeStatus');
const faceRow             = document.getElementById('faceIndicatorRow');
const indFace             = document.getElementById('indFace');
const indFaceStatus       = document.getElementById('indFaceStatus');

const qualityGrid    = document.querySelector('.quality-grid');
const shutterFlash   = document.getElementById('shutterFlash');
const apiActionsEl   = document.getElementById('apiActions');
const apiResultsRow  = document.getElementById('apiResultsRow');
const ocrDetailsEl   = document.getElementById('ocrDetails');
const guruDetailsEl  = document.getElementById('guruDetails');
const livenessBtn    = document.getElementById('livenessBtn');
const ocrBtn         = document.getElementById('ocrBtn');
const guruBtn        = document.getElementById('guruBtn');
const startBtn       = document.getElementById('startBtn');
const stopBtn        = document.getElementById('stopBtn');
const captureBtn     = document.getElementById('captureBtn');
const applyConfig    = document.getElementById('applyConfigBtn');
const videoContainer = document.getElementById('videoContainer');
const fallbackCont   = document.getElementById('fallbackContainer');

// ── State ─────────────────────────────────────────────────────────────────
let snap           = null;
let stream         = null;
let sideObjectUrls = [];   // [{ full: url|null, doc: url|null }] — one per captured side
let capturedSides  = [];   // CaptureResult array for the current session
let _lastCompletedSides = [];  // Preserved for API buttons after auto-restart
let activeSide     = 0;
let _autoRestartTimer = null;  // setTimeout ID for auto-restart after capture

const MAX_HISTORY    = 20;
const captureHistory = [];

// ── API wait popup ────────────────────────────────────────────────────────
const apiWaitPopup = document.getElementById('apiWaitPopup');
function showApiWait(vendor) {
  apiWaitPopup.innerHTML = '<span class="api-spin"></span> Waiting for ' + vendor + '...';
  apiWaitPopup.style.display = 'block';
}
function hideApiWait() {
  apiWaitPopup.style.display = 'none';
}

// ── Shutter feedback (flash + sound) ──────────────────────────────────────
const shutterAudio = new Audio('shutter.mp3');
shutterAudio.preload = 'auto';

function triggerShutter() {
  // Start audio first — browsers introduce ~100-300ms latency before sound plays.
  // Delay the visual flash so it syncs with the actual sound onset.
  shutterAudio.currentTime = 0;
  var playPromise = shutterAudio.play();

  function fireFlash() {
    shutterFlash.classList.remove('active');
    void shutterFlash.offsetWidth;          // force reflow to restart animation
    shutterFlash.classList.add('active');
  }

  if (playPromise && typeof playPromise.then === 'function') {
    // play() resolved → audio is decoding/playing; fire flash now
    playPromise.then(fireFlash).catch(function () {
      // Autoplay blocked — fire flash without sound
      fireFlash();
    });
  } else {
    // Old browser without Promise-based play()
    fireFlash();
  }
}

// ── Doc type dependent settings ──────────────────────────────────────────
function onDocTypeChange() {
  var dt = document.getElementById('cfgDocType').value;
  var isDoc = (dt === 'document');
  var cfgSides = document.getElementById('cfgSides');
  var cfgFace  = document.getElementById('cfgFace');
  cfgSides.disabled = isDoc;
  cfgFace.disabled  = isDoc;
  if (isDoc) {
    cfgSides.value = '1';
    cfgFace.value  = 'off';
  }
}

// ── Settings persistence ──────────────────────────────────────────────────
const SETTINGS_KEY = 'docusnap_settings';
const SETTING_IDS  = ['cfgDocType','cfgMode','cfgSides','cfgFace','cfgSharpness','cfgBrightness','cfgGlare','cfgDocSize','cfgLivenessProxy',
  'msg_SEARCHING','msg_MOVE_CLOSER','msg_CENTER_DOCUMENT','msg_SHARPEN','msg_REDUCE_GLARE','msg_IMPROVE_LIGHTING','msg_HOLD_STILL','msg_CONFIRMED'];

// IDs that are shared via config.json (persisted server-side for all users)
const SHARED_SETTING_IDS = [];

function saveSettings() {
  try {
    var obj = {};
    SETTING_IDS.forEach(function (id) {
      var el = document.getElementById(id);
      if (el) obj[id] = el.value;
    });
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(obj));
  } catch (e) { /* localStorage unavailable */ }

  // Also persist shared settings to the proxy → config.json
  try {
    var shared = {};
    SHARED_SETTING_IDS.forEach(function (id) {
      var el = document.getElementById(id);
      if (el && el.value) shared[id] = el.value;
    });
    if (Object.keys(shared).length) {
      var proxyBase = document.getElementById('cfgLivenessProxy').value.trim() || 'http://localhost:3001';
      fetch(proxyBase + '/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(shared),
      }).catch(function () { /* proxy not running — config.json not updated */ });
    }
  } catch (e) { /* ignore */ }
}

function loadSettings() {
  try {
    var raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    var obj = JSON.parse(raw);
    // Migrate legacy "passport" to "id"
    if (obj['cfgDocType'] === 'passport') obj['cfgDocType'] = 'id';
    SETTING_IDS.forEach(function (id) {
      if (obj[id] !== undefined) {
        var el = document.getElementById(id);
        if (el) el.value = obj[id];
      }
    });
  } catch (e) { /* ignore */ }
}

// Load shared config: try proxy /config first, fall back to static config.json
(function loadSharedAndLocalSettings() {
  var proxyBase = (document.getElementById('cfgLivenessProxy') || {}).value || 'http://localhost:3001';
  proxyBase = proxyBase.trim() || 'http://localhost:3001';

  function applyShared(shared) {
    Object.keys(shared).forEach(function (id) {
      var el = document.getElementById(id);
      if (el && shared[id]) el.value = shared[id];
    });
    loadSettings();
    onDocTypeChange();
  }

  fetch(proxyBase + '/config').then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(applyShared)
    .catch(function () {
      // Proxy unavailable — fall back to static config.json
      fetch('config.json').then(function (r) { return r.ok ? r.json() : {}; })
        .catch(function () { return {}; })
        .then(applyShared);
    });
})();

// ── Config ────────────────────────────────────────────────────────────────
function buildConfig() {
  const docType = document.getElementById('cfgDocType').value;
  const mode    = document.getElementById('cfgMode').value;
  const sides   = parseInt(document.getElementById('cfgSides').value, 10) || 1;
  const faceOpt = document.getElementById('cfgFace').value;

  const nv = (id, def) => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? def : v; };
  const q = {
    sharpness:  nv('cfgSharpness',  40),
    brightness: nv('cfgBrightness', 40),
    glare:      nv('cfgGlare',      18),
    size:       nv('cfgDocSize',    40),
  };

  const faceConfig = faceOpt === 'off'
    ? { detect: false }
    : { detect: true, requirePresent: faceOpt === 'require' ? true : null, minConfidence: 0.6 };

  return { docType, mode, sides, quality: q, faceConfig };
}

// ── Init / restart ─────────────────────────────────────────────────────────
async function initApp() {
  // Auto-start immediately on page load.
  // startCapture handles both camera mode and file-fallback mode internally.
  await startCapture(false);
}

async function startCapture(forceFile) {
  if (_autoRestartTimer) { clearTimeout(_autoRestartTimer); _autoRestartTimer = null; }
  destroySnap();
  activeSide = 0;
  revokeCapturedUrls();
  resetResultPanel();
  // Reset throttled display state so a fresh session starts clean
  _dispCode = null; _dispHint = ''; _dispEscalated = false; _dispSince = -INSTRUCTION_MIN_MS;

  const cfg = buildConfig();

  // Face detection UI visibility
  const faceActive = cfg.faceConfig.detect;
  faceRow.style.display   = faceActive ? 'flex' : 'none';
  faceBadge.style.display = faceActive ? 'block' : 'none';
  if (faceActive) { faceBadge.textContent = '👤 –'; faceBadge.className = 'unknown'; }

  capturedSides  = [];
  // sideSteps are driven entirely by frame.sideIndex in handleFrame; reset here
  sideSteps.style.display = 'none';
  sideSteps.innerHTML     = '';

  snap = new DocuSnap({
    documentType:      cfg.docType,
    captureMode:       forceFile ? 'file' : cfg.mode,
    sides:             cfg.sides,
    quality:           cfg.quality,
    face:              cfg.faceConfig,
    fallbackContainer: fallbackCont,
    onFrame:   handleFrame,
    onCapture: handleCapture,
    onError:   handleError,
  });

  if (forceFile || DocuSnap.detectCapability() === 'file') {
    showFallbackMode();
    await snap.start(null, null);
  } else {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      showCameraMode();
      await snap.start(video, canvas);

      startBtn.disabled = true;
      stopBtn.disabled  = false;

      // Capture button only visible in manual mode
      const isManual = cfg.mode === 'manual';
      captureBtn.style.display = isManual ? '' : 'none';
      captureBtn.disabled      = !isManual;

      banner._enabled = true;
    } catch (err) {
      console.warn('Camera unavailable (' + err.name + ') — file mode');
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      showFallbackMode();
      await snap.start(null, null);
    }
  }

  // Apply saved debug layer (live, no restart needed)
}

function destroySnap() {
  if (snap)   { snap.destroy(); snap = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
}

// ── Display mode helpers ───────────────────────────────────────────────────
function showCameraMode() {
  canvas.style.display       = '';
  fallbackCont.style.display = 'none';
  videoContainer.classList.remove('fallback-mode');
  banner._enabled = true;
}

function showFallbackMode() {
  canvas.style.display       = 'none';
  fallbackCont.style.display = '';
  videoContainer.classList.add('fallback-mode');
  banner._enabled = false; banner.className = ''; _bannerShownText = null; _bannerAnimating = false; _bannerPending = null;
  startBtn.style.display   = 'none';
  stopBtn.style.display    = 'none';
  captureBtn.style.display = 'none';
}

// ── Instruction-code throttle ──────────────────────────────────────────────
// Actionable failure codes (REDUCE_GLARE, MOVE_CLOSER, etc.) can flicker
// several times per second as scores hover around the threshold.
// We hold each message for at least INSTRUCTION_MIN_MS before switching to a
// different one.  State transitions (SEARCHING / CONFIRMED / HOLD_STILL) are
// always applied immediately — they represent real workflow phase changes.
const INSTRUCTION_MIN_MS = 800;
// State-transition codes bypass the 800ms throttle (incoming only).
// The throttle only gates failure-code ↔ failure-code swaps.
const INSTANT_CODES = new Set(['CONFIRMED', 'HOLD_STILL', 'SEARCHING']);
let _dispCode      = null;   // instruction code currently shown
let _dispHint      = '';     // hint text currently shown
let _dispEscalated = false;  // hintEscalated flag for the shown hint
let _dispSince     = -INSTRUCTION_MIN_MS;  // ensures the very first code always shows immediately

function resolveDisplayCode(frame) {
  const code = frame.instructionCode;
  if (code === _dispCode) return;  // nothing changed — keep current
  // Update immediately for privileged state transitions; throttle between
  // failure codes to avoid distracting rapid text changes.
  // Only allow instant transition TO privileged codes, never FROM them
  const instant = INSTANT_CODES.has(code);
  if (instant || (performance.now() - _dispSince) >= INSTRUCTION_MIN_MS) {
    _dispCode      = code;
    _dispHint      = getInstructionText(code);
    _dispEscalated = frame.hintEscalated;
    _dispSince     = performance.now();
  }
}

// ── Banner animation ───────────────────────────────────────────────────────
let _bannerShownText = null;
let _bannerAnimating = false;
let _bannerPending   = null;  // latest text queued while animating

function setBannerText(text) {
  if (!banner._enabled) return;

  if (_bannerAnimating) {
    _bannerPending = text;  // keep latest, apply after animation finishes
    return;
  }

  if (text === _bannerShownText && banner.className === 'visible') return;

  if (banner.className !== 'visible') {
    // Not visible — set text and fade straight in
    _bannerShownText   = text;
    banner.textContent = text;
    banner.className   = 'visible';
    return;
  }

  // Visible and text changed — fade out, swap, fade in
  _bannerAnimating = true;
  banner.className = '';                  // drop 'visible' → CSS fade-out (300ms)
  setTimeout(function () {
    if (!banner._enabled) { _bannerAnimating = false; _bannerPending = null; return; }
    var next = (_bannerPending !== null) ? _bannerPending : text;
    _bannerPending     = null;
    _bannerShownText   = next;
    banner.textContent = next;
    banner.className   = 'visible';       // CSS fade-in (300ms)
    setTimeout(function () {
      _bannerAnimating = false;
      // Flush any update that arrived during fade-in
      if (_bannerPending !== null) {
        var p = _bannerPending; _bannerPending = null;
        setBannerText(p);
      }
    }, 300);
  }, 300);
}

// ── Frame handler ──────────────────────────────────────────────────────────
function getInstructionText(code) {
  var el = document.getElementById('msg_' + code);
  return el ? el.value : code;
}

function handleFrame(frame) {
  const IC = DocuSnap.InstructionCode;

  // Resolve which instruction code/hint to display (throttled for failures).
  resolveDisplayCode(frame);

  // Update step indicator from live sideIndex (shows which side is being scanned)
  if (frame.sidesTotal > 1) updateSideSteps(frame.sideIndex, frame.sidesTotal);

  // ── Document detection state ─────────────────────────────────────────────
  // Quality metrics are only meaningful once a document has been located.
  // While searching, dim the grid and show a neutral "looking" message.
  // Use the raw frame code here so the grid dimming tracks reality, not the
  // throttled display — ensures indicators snap back to live data immediately.
  const searching = (frame.instructionCode === IC.SEARCHING);

  qualityGrid.classList.toggle('inactive', searching);

  // Instruction banner (overlay on video) — uses throttled code/hint
  if (banner._enabled) setBannerText(_dispHint);

  // Score / state line — shows raw instruction code name
  if (_dispCode === IC.CONFIRMED || _dispCode === IC.HOLD_STILL) {
    scoreEl.textContent = _dispCode;
    scoreEl.className   = 'qp-score';
    scoreEl.style.color = '#2ed573';
  } else {
    scoreEl.textContent = _dispCode || '–';
    scoreEl.className   = 'qp-score';
    scoreEl.style.color = '#ff4757';
  }

  // Hint box — hidden when banner is active (banner already shows same text on video)
  if (searching || banner._enabled) {
    hintBox.style.display = 'none';
  } else {
    const isGood = (_dispCode === IC.CONFIRMED || _dispCode === IC.HOLD_STILL);
    hintBox.style.display = '';
    hintBox.textContent   = _dispHint;
    hintBox.className     = isGood ? 'good' : (_dispEscalated ? '' : 'neutral');
  }

  // Quality indicators — only update values when document is detected
  if (!searching) {
    const q = frame.quality;
    setIndicator(indSharpness,  indSharpnessStatus,  q.sharpness,  !q.failing.includes('sharpness'),  '%');
    setIndicator(indBrightness, indBrightnessStatus, q.brightness, !q.failing.includes('brightness'), '%');
    setIndicator(indGlare,      indGlareStatus,      q.glare,      !q.failing.includes('glare'),      '%');
    setIndicator(indDocSize,    indDocSizeStatus,     q.size,       !q.failing.includes('size'),       '%');
  }

  // Face detection row
  if (frame.face !== null && frame.face !== undefined) {
    const requireFace = document.getElementById('cfgFace').value === 'require';
    faceRow.style.display   = 'flex';
    faceBadge.style.display = 'block';
    if (frame.face.present === null || searching) {
      indFace.textContent       = '–';
      indFaceStatus.textContent = '⚪';
      faceBadge.textContent     = '👤 –';
      faceBadge.className       = 'unknown';
    } else if (frame.face.present) {
      indFace.textContent       = 'Yes';
      indFaceStatus.textContent = requireFace ? '✅' : '⚪';
      faceBadge.textContent     = '👤 ✓';
      faceBadge.className       = 'present';
    } else {
      indFace.textContent       = 'No';
      indFaceStatus.textContent = requireFace ? '❌' : '⚪';
      faceBadge.textContent     = '👤 ✗';
      faceBadge.className       = 'absent';
    }
  }
}

function setIndicator(valueEl, statusEl, value, pass, suffix) {
  valueEl.textContent  = typeof value === 'number' ? value.toFixed(0) + (suffix || '') : value;
  statusEl.textContent = pass ? '✅' : '❌';
}

// ── Capture handler ────────────────────────────────────────────────────────
function handleCapture(cr) {
  // Shutter flash + sound for real camera captures (not file uploads)
  if (cr.captureMode !== 'file') triggerShutter();

  // Clear previous API results on every new capture
  apiResultsRow.style.display = 'none';
  apiResultsRow.innerHTML     = '';
  ocrDetailsEl.style.display  = 'none';
  ocrDetailsEl.innerHTML      = '';
  guruDetailsEl.style.display = 'none';
  guruDetailsEl.innerHTML     = '';

  activeSide = cr.sideIndex;
  capturedSides.push(cr);

  // Store per-side object URLs (revoked on next session start)
  sideObjectUrls[cr.sideIndex] = {
    full: cr.image         ? URL.createObjectURL(cr.image)         : null,
    doc:  cr.documentImage ? URL.createObjectURL(cr.documentImage) : null,
  };
  const urls = sideObjectUrls[cr.sideIndex];

  // Score line
  scoreEl.textContent = cr.isLastSide && cr.sidesTotal > 1
    ? '✅ Both sides captured!'
    : '✅ Captured!';
  scoreEl.style.color = '#2ed573';

  // Face badge
  if (cr.face && cr.face.present !== null) {
    const requireFace = document.getElementById('cfgFace').value === 'require';
    indFace.textContent       = cr.face.present ? 'Yes' : 'No';
    indFaceStatus.textContent = requireFace ? (cr.face.present ? '✅' : '❌') : '⚪';
    faceBadge.textContent     = cr.face.present ? '👤 ✓' : '👤 ✗';
    faceBadge.className       = cr.face.present ? 'present' : 'absent';
  }

  if (!cr.isLastSide) {
    // ── Intermediate capture (first of multiple sides) ────────────────────
    renderSingleCapture(urls, cr.quality, cr.face);
    updateSideSteps(cr.sideIndex, cr.sidesTotal);
    // Auto-advance to back side after 2s — detection restarts automatically
    if (snap) {
      setTimeout(function () {
        if (snap) {
          snap.nextSide();
          _dispCode = null; _dispHint = ''; _dispEscalated = false; _dispSince = -INSTRUCTION_MIN_MS;
        }
      }, 2000);
    }
  } else if (cr.sidesTotal > 1) {
    // ── All sides complete — add grouped entry to history ─────────────────
    renderTwoUpCapture(capturedSides);
    updateSideSteps(cr.sideIndex, cr.sidesTotal);
    addGroupedToHistory(capturedSides);
  } else {
    // ── Single-side capture — add to history ──────────────────────────────
    renderSingleCapture(urls, cr.quality, cr.face);
    addToHistory(cr);
  }

  // Glow effect on result card
  result.style.boxShadow = '0 0 30px #2ed573';
  setTimeout(function () { result.style.boxShadow = 'none'; }, 500);

  // The library automatically pauses when isLastSide === true — no extra call
  // needed here. Re-enable Start so the user can kick off a fresh session.
  if (cr.isLastSide) {
    _lastCompletedSides = capturedSides.slice();
    startBtn.disabled = false;
    stopBtn.disabled  = true;
    // Auto-restart detection after 3 seconds
    if (_autoRestartTimer) clearTimeout(_autoRestartTimer);
    _autoRestartTimer = setTimeout(function () {
      _autoRestartTimer = null;
      if (snap) {
        capturedSides = [];
        sideSteps.style.display = 'none';
        sideSteps.innerHTML     = '';
        snap.reset();
        banner._enabled = true;
        startBtn.disabled = true;
        stopBtn.disabled  = false;
      }
    }, 3000);
  }

}

// ── Render helpers ─────────────────────────────────────────────────────────

/** Render a single-side capture into the result area. */
function renderSingleCapture(urls, quality, face) {
  if (urls && urls.doc) {
    showResultImage(urls.doc);
    capturedTabs.style.display = 'flex';
    tabDoc.classList.add('active');
    tabFull.classList.remove('active');
    showApiActions();
  } else {
    showResultImage(urls && urls.full);
    capturedTabs.style.display = 'none';
    hideApiActions();
  }
  renderCapturedQuality(quality, face);
}

/** Render a two-up grid showing all captured sides. */
function renderTwoUpCapture(sides) {
  capturedTabs.style.display      = 'none';
  capturedQualityEl.style.display = 'none';
  capturedQualityEl.innerHTML     = '';
  showApiActions();

  const labels = ['Front', 'Back'];
  let html = '<div class="two-up">';
  sides.forEach(function (cr) {
    const urls   = sideObjectUrls[cr.sideIndex] || {};
    const imgUrl = urls.doc || urls.full;
    const lbl    = labels[cr.sideIndex] || ('Side ' + (cr.sideIndex + 1));
    html += '<div class="two-up-col">';
    html += imgUrl
      ? '<img class="two-up-img" src="' + imgUrl + '" alt="' + lbl + '">'
      : '<div style="min-height:80px;display:flex;align-items:center;justify-content:center;color:#444;font-size:11px;">No image</div>';
    html += '<div class="two-up-lbl">' + lbl + '</div>';
    if (cr.quality) {
      const q    = cr.quality;
      const fail = q.failing || [];
      html += '<div class="two-up-quality">';
      html += badge('Sharp:',  q.sharpness.toFixed(0)  + '%', !fail.includes('sharpness'));
      html += badge('Bright:', q.brightness.toFixed(0) + '%', !fail.includes('brightness'));
      html += badge('Glare:',  q.glare.toFixed(0)      + '%', !fail.includes('glare'));
      html += badge('Size:',   q.size.toFixed(0)        + '%', !fail.includes('size'));
      if (cr.face) {
        const p = cr.face.present;
        html += p === null ? '<span class="hbadge neutral">Face: <span class="hb-val">–</span></span>'
                           : badge('Face:', (p ? 'Yes' : 'No'), p);
      }
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  result.innerHTML = html;
}

/** Render the step-dots indicator for multi-side scanning. */
function updateSideSteps(sideIdx, sidesTotal) {
  if (!sidesTotal || sidesTotal < 2) { sideSteps.style.display = 'none'; return; }
  const labels = ['FRONT', 'BACK'];
  let html = '';
  for (let i = 0; i < sidesTotal; i++) {
    const isDone   = capturedSides.some(function (c) { return c.sideIndex === i; });
    const isActive = !isDone && i === sideIdx;
    const cls      = isDone ? 'done' : isActive ? 'active' : '';
    if (i > 0) {
      const prevDone = capturedSides.some(function (c) { return c.sideIndex === i - 1; });
      html += '<div class="step-connector' + (prevDone ? ' done' : '') + '"></div>';
    }
    html +=
      '<div class="step-item">' +
        '<div class="step-dot '  + cls + '"></div>' +
        '<div class="step-lbl '  + cls + '">' + (labels[i] || 'SIDE ' + (i + 1)) + '</div>' +
      '</div>';
  }
  sideSteps.style.display = 'flex';
  sideSteps.innerHTML = html;
}

function handleError(err) {
  console.error('[demo] DocuSnap error:', err);
  scoreEl.textContent = '⚠ ' + err.code;
  scoreEl.style.color  = '#ff4757';
}

// ── Captured quality snapshot ──────────────────────────────────────────────
function renderCapturedQuality(q, face) {
  capturedQualityEl.innerHTML = '';
  if (!q) { capturedQualityEl.style.display = 'none'; return; }

  const metrics = [
    { label: 'Sharpness',  value: q.sharpness,  pass: !q.failing.includes('sharpness'),  suffix: '%' },
    { label: 'Brightness', value: q.brightness, pass: !q.failing.includes('brightness'), suffix: '%' },
    { label: 'Glare',      value: q.glare,       pass: !q.failing.includes('glare'),      suffix: '%' },
    { label: 'Doc Size',   value: q.size,        pass: !q.failing.includes('size'),       suffix: '%' },
  ];
  // Show Face Present whenever face detection was active (face object exists),
  // even if the result is still pending (present === null → show "–" with ⚪).
  if (face) {
    const p = face.present;
    metrics.push({
      label: 'Face Present',
      value: p === null ? '–' : (p ? 'Yes' : 'No'),
      icon:  p === null ? '⚪' : (p ? '✅' : '❌'),
      suffix: '',
    });
  }

  capturedQualityEl.style.display = 'grid';
  metrics.forEach(function (m) {
    const row = document.createElement('div');
    row.className = 'cap-ind';
    const val    = typeof m.value === 'number' ? m.value.toFixed(0) + m.suffix : m.value;
    const status = m.icon != null ? m.icon : (m.pass ? '✅' : '❌');
    row.innerHTML =
      '<span class="ind-label">'  + m.label  + '</span>' +
      '<span class="ind-value">'  + val      + '</span>' +
      '<span class="ind-status">' + status   + '</span>';
    capturedQualityEl.appendChild(row);
  });
}

// ── Capture history ────────────────────────────────────────────────────────
function addToHistory(cr) {
  const thumbUrl = cr.documentImage ? URL.createObjectURL(cr.documentImage) : null;
  captureHistory.unshift({
    id: Date.now(), timestamp: cr.timestamp,
    thumbUrl, quality: cr.quality, face: cr.face, sideIndex: cr.sideIndex,
    sides: null,   // populated for grouped 2-side entries
    livenessResult: null, ocrResult: null, guruResult: null,
  });
  while (captureHistory.length > MAX_HISTORY) {
    const old = captureHistory.pop();
    if (old.thumbUrl) URL.revokeObjectURL(old.thumbUrl);
    if (old.sides) old.sides.forEach(function (s) { if (s.thumbUrl) URL.revokeObjectURL(s.thumbUrl); });
  }
  renderHistory();
}

/** Add a grouped 2-side entry directly to history. */
function addGroupedToHistory(allSides) {
  var grouped = allSides.map(function (cr) {
    return {
      thumbUrl: cr.documentImage ? URL.createObjectURL(cr.documentImage) : null,
      quality: cr.quality,
      face: cr.face,
      sideIndex: cr.sideIndex,
    };
  });
  grouped.sort(function (a, b) { return a.sideIndex - b.sideIndex; });
  var last = allSides[allSides.length - 1];
  captureHistory.unshift({
    id: Date.now(), timestamp: last.timestamp,
    thumbUrl: null, quality: last.quality, face: last.face, sideIndex: 0,
    sides: grouped,
    livenessResult: null, ocrResult: null, guruResult: null,
  });
  while (captureHistory.length > MAX_HISTORY) {
    var old = captureHistory.pop();
    if (old.thumbUrl) URL.revokeObjectURL(old.thumbUrl);
    if (old.sides) old.sides.forEach(function (s) { if (s.thumbUrl) URL.revokeObjectURL(s.thumbUrl); });
  }
  renderHistory();
}

function renderHistory() {
  historyListEl.innerHTML = '';
  if (!captureHistory.length) {
    historyListEl.innerHTML = '<p class="history-empty">No captures yet</p>';
    return;
  }
  captureHistory.forEach(function (e) {
    const item = document.createElement('div');
    item.className = 'history-item';

    const q   = e.quality;
    const ts  = e.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    let badges = '';
    if (q) {
      badges +=
        badge('Sharp:',  q.sharpness.toFixed(0)  + '%', !q.failing.includes('sharpness'))  +
        badge('Bright:', q.brightness.toFixed(0) + '%', !q.failing.includes('brightness')) +
        badge('Glare:',  q.glare.toFixed(0)      + '%', !q.failing.includes('glare'))      +
        badge('Size:',   q.size.toFixed(0)        + '%', !q.failing.includes('size'));
    }
    // Show face badge whenever face detection was active (face object present),
    // using neutral style when result is still pending (present === null).
    if (e.face) {
      const p = e.face.present;
      if (p === null) {
        badges += '<span class="hbadge neutral">Face: <span class="hb-val">–</span></span>';
      } else {
        badges += badge('Face:', (p ? 'Yes' : 'No'), p);
      }
    }

    // Liveness badges
    if (e.livenessResult) {
      var ld  = e.livenessResult;
      var agg = ld.aggregate_liveness_probability;
      if (typeof agg === 'number') {
        badges += '<span class="hbadge hbadge-live ' + (agg >= 0.5 ? 'pass' : 'fail') + '">' +
                  'Liveness: <span class="hb-val">' + (agg * 100).toFixed(1) + '%</span></span>';
      }
      if (ld.pipeline_results) {
        var pipeLabels = { 'default-sr': 'Screen', 'default-pc': 'Print', 'default-ps': 'Portrait' };
        ld.pipeline_results.forEach(function (pr) {
          var prob = pr.result && typeof pr.result.liveness_probability === 'number'
            ? (pr.result.liveness_probability * 100).toFixed(1) + '%'
            : (pr.result && pr.result.status_code) || '–';
          var pass2 = pr.result && pr.result.liveness_probability >= 0.5;
          badges += '<span class="hbadge hbadge-live ' + (pass2 ? 'pass' : 'fail') + '">' +
                    (pipeLabels[pr.pipeline_name] || pr.pipeline_name) + ': <span class="hb-val">' + prob + '</span></span>';
        });
      }
    }

    // OCR badge
    var ocrName = '';
    if (e.ocrResult) {
      var _ocrTop = (e.ocrResult.data && typeof e.ocrResult.data === 'object') ? e.ocrResult.data : e.ocrResult;
      var r2 = _ocrTop.result || _ocrTop.recognizerResults || _ocrTop;
      function sv2(f) {
        var v = f && f.value ? f.value : (typeof f === 'string' ? f : '');
        return (v && !v.endsWith('_NONE')) ? v : '';
      }
      ocrName = [sv2(r2.firstName), sv2(r2.lastName)].filter(Boolean).join(' ');
      var docNo2 = sv2(r2.documentNumber);
      if (ocrName || docNo2) {
        badges += '<span class="hbadge hbadge-ocr">' +
                  '📋 ' + [ocrName, docNo2].filter(Boolean).join(' / ') + '</span>';
      }
    }

    // Guru badge
    if (e.guruResult) {
      var gd = e.guruResult;
      var guruLabel = gd.document_category || 'Analysed';
      var guruConf = typeof gd.classification_confidence === 'number'
        ? ' ' + (gd.classification_confidence * 100).toFixed(0) + '%' : '';
      badges += '<span class="hbadge hbadge-ocr">Guru: <span class="hb-val">' +
                guruLabel + guruConf + '</span></span>';
    }

    // Thumbnail(s)
    var imgHtml = '';
    if (e.sides && e.sides.length > 1) {
      // Grouped 2-side entry: side-by-side thumbnails
      imgHtml = '<div class="history-img-wrap history-img-pair">';
      e.sides.forEach(function (s) {
        var lbl = s.sideIndex === 0 ? 'Front' : 'Back';
        imgHtml += '<div class="history-side">' +
          (s.thumbUrl ? '<img src="' + s.thumbUrl + '" alt="' + lbl + '">' : '<div class="no-thumb">–</div>') +
          '<div class="history-side-lbl">' + lbl + '</div>' +
        '</div>';
      });
      imgHtml += '</div>';
    } else {
      imgHtml = '<div class="history-img-wrap">' +
        (e.thumbUrl ? '<img src="' + e.thumbUrl + '" alt="capture">' : '<div class="no-thumb">No image</div>') +
      '</div>';
    }

    var sideLabel = e.sides ? (e.sides.length + ' sides') : ('Side ' + (e.sideIndex + 1));
    item.innerHTML =
      imgHtml +
      '<div class="history-info">' +
        '<div class="history-ts">' + ts + ' · ' + sideLabel + '</div>' +
        '<div class="history-badges">' + badges + '</div>' +
      '</div>';

    historyListEl.appendChild(item);
  });
}

function badge(label, value, pass) {
  return '<span class="hbadge ' + (pass ? 'pass' : 'fail') + '">' +
    label + ' <span class="hb-val">' + value + '</span></span>';
}

function blobToBase64(blob) {
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload  = function () { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/** Always use the full-res cropped image of the front side (side 0). */

// ── ID R&D Liveness ────────────────────────────────────────────────────────
async function checkLiveness() {
  var blob = getFrontDocBlob();
  if (!blob) { alert('No cropped front image available.'); return; }

  // The ID R&D API is server-side only (no CORS). Require a proxy URL.
  var proxyUrl = (document.getElementById('cfgLivenessProxy') || {}).value;
  proxyUrl = proxyUrl ? proxyUrl.trim().replace(/\/$/, '') : '';
  if (!proxyUrl) {
    apiResultsRow.style.display = 'flex';
    apiResultsRow.innerHTML =
      '<span style="color:#ffa502;font-size:11px;">ℹ Liveness requires a proxy — ' +
      'run <code style="background:#111;padding:1px 4px;border-radius:3px;">npm run proxy</code> ' +
      'then set the URL in ⚙ Settings.</span>';
    return;
  }

  livenessBtn.disabled = true;
  livenessBtn.innerHTML = '<span class="api-spin"></span> Checking…';
  apiResultsRow.style.display = 'none';
  showApiWait('ID R&D');

  try {
    var b64 = await blobToBase64(blob);
    // POST to the local proxy — it adds the x-api-key and forwards to ID R&D.
    var resp = await fetch(proxyUrl + '/check_liveness', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: b64,
        pipelines: [
          { pipeline_name: 'default-sr', calibration: 'REGULAR' },
          { pipeline_name: 'default-pc', calibration: 'REGULAR' },
          { pipeline_name: 'default-ps', calibration: 'REGULAR' },
        ],
      }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
    var data = await resp.json();
    // Persist on latest history entry so it survives a re-render
    if (captureHistory.length) captureHistory[0].livenessResult = data;
    renderApiResultsRow(data, captureHistory[0] && captureHistory[0].ocrResult);
    renderHistory();
  } catch (err) {
    var livMsg = err.message;
    if (err instanceof TypeError && livMsg === 'Failed to fetch') {
      livMsg = 'Could not reach proxy at ' + proxyUrl + ' — is it running?';
    }
    apiResultsRow.style.display = 'flex';
    apiResultsRow.innerHTML =
      '<span style="color:#ff4757;font-size:11px;">⚠ Liveness error: ' + livMsg + '</span>';
  } finally {
    hideApiWait();
    livenessBtn.disabled = false;
    livenessBtn.innerHTML = 'Liveness Check';
  }
}

// ── Microblink BlinkID OCR ─────────────────────────────────────────────────
async function sendToOCR() {
  var _sides = capturedSides.length ? capturedSides : _lastCompletedSides;
  if (!_sides.length) { alert('No capture available.'); return; }

  ocrBtn.disabled = true;
  ocrBtn.innerHTML = '<span class="api-spin"></span> Scanning…';
  showApiWait('Microblink');

  try {
    var front     = _sides.find(function (cr) { return cr.sideIndex === 0; });
    var back      = _sides.find(function (cr) { return cr.sideIndex === 1; });
    var frontBlob = front ? (front.documentImage || front.image) : null;
    var backBlob  = back  ? (back.documentImage  || back.image)  : null;
    if (!frontBlob) throw new Error('No front image available');

    // Use combined recognizer when both sides are available, single-side otherwise.
    // The combined endpoint returns STAGE_VALID (incomplete) with empty fields
    // when only the front is provided — it waits for the back side.
    var useCombined = !!backBlob;
    var endpoint = useCombined
      ? 'https://api.microblink.com/v1/recognizers/blinkid-combined'
      : 'https://api.microblink.com/v1/recognizers/blinkid';

    var frontB64 = await blobToBase64(frontBlob);
    var body = {
      returnFullDocumentImage:  false,
      returnFaceImage:          false,
      returnSignatureImage:     false,
      // Our crop includes a 25% margin around the document, so Microblink
      // still needs to locate the document within the image. Setting this to
      // false lets it search; true would assume the entire image IS the doc.
      scanCroppedDocumentImage: false,
    };

    if (useCombined) {
      body.imageFrontSide = frontB64;
      body.imageBackSide  = await blobToBase64(backBlob);
    } else {
      body.imageSource = frontB64;
    }

    var resp = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': MICROBLINK_AUTH,
      },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
    var data = await resp.json();

    // Persist on history entry
    if (captureHistory.length) captureHistory[0].ocrResult = data;
    renderApiResultsRow(captureHistory[0] && captureHistory[0].livenessResult, data);
    renderOcrDetails(data);
    renderHistory();
  } catch (err) {
    ocrDetailsEl.style.display = 'block';
    ocrDetailsEl.innerHTML =
      '<div class="ocr-hdr">OCR Error</div>' +
      '<div style="color:#ff4757;font-size:11px;">' + err.message + '</div>';
  } finally {
    hideApiWait();
    ocrBtn.disabled = false;
    ocrBtn.innerHTML = 'Microblink OCR';
  }
}

// ── API result renderers ───────────────────────────────────────────────────

/** Render the one-line result row combining liveness and OCR summary. */
function renderApiResultsRow(livenessData, ocrData) {
  var html = '';

  if (livenessData) {
    var agg = livenessData.aggregate_liveness_probability;
    var aggPct = typeof agg === 'number' ? (agg * 100).toFixed(1) + '%' : '–';
    var aggPass = typeof agg === 'number' ? agg >= 0.5 : null;
    html += apiCell('Liveness', aggPct, aggPass);

    var pipeLabels = { 'default-sr': 'Screen', 'default-pc': 'Print', 'default-ps': 'Portrait' };
    if (livenessData.pipeline_results) {
      livenessData.pipeline_results.forEach(function (pr) {
        var lbl  = pipeLabels[pr.pipeline_name] || pr.pipeline_name;
        var prob = pr.result && typeof pr.result.liveness_probability === 'number'
          ? (pr.result.liveness_probability * 100).toFixed(1) + '%'
          : (pr.result && pr.result.status_code) || '–';
        var pass = pr.result && pr.result.liveness_probability >= 0.5;
        html += apiCell(lbl, prob, pass);
      });
    }
    var warn = livenessData.aggregate_image_quality_warnings;
    if (warn && warn.length) {
      html += apiCell('Warnings', warn.join(', '), null, 'amber');
    }
  }

  if (ocrData) {
    var r = ocrData.result || ocrData.recognizerResults || ocrData;
    function sv(f) { return f && f.value ? f.value : (typeof f === 'string' ? f : null); }
    var name = [sv(r.firstName), sv(r.lastName)].filter(Boolean).join(' ');
    if (name) html += apiCell('Name', name, true);
    var docNo = sv(r.documentNumber);
    if (docNo) html += apiCell('Doc#', docNo, null);
    var status = ocrData.executionStatus || ocrData.status;
    if (status) html += apiCell('Status', status, status === 'VALID' ? true : null, 'amber');
  }

  if (html) {
    apiResultsRow.style.display = 'grid';
    apiResultsRow.innerHTML = html;
  }
}

function apiCell(label, value, pass, forceColor) {
  var colorCls = forceColor || '';
  var icon = '';
  if (!forceColor && pass !== null && pass !== undefined) {
    colorCls = pass ? 'green' : 'red';
    icon = '<span class="api-cell-status">' + (pass ? '✅' : '❌') + '</span>';
  }
  return '<div class="api-cell">' +
    '<span class="api-cell-lbl">' + label + '</span>' +
    '<span class="api-cell-val ' + colorCls + '">' + value + '</span>' +
    icon +
    '</div>';
}

/** Render the OCR field details panel. */
function renderOcrDetails(data) {
  // Handle both flat { result: {...} } and nested { data: { result: {...} } } shapes.
  var top = (data.data && typeof data.data === 'object') ? data.data : data;
  var r = top.result || top.recognizerResults || top;

  // recognitionStatus lives at the top level (outside result in some API versions)
  var status = top.recognitionStatus || r.recognitionStatus || '';
  var statusOk = status === 'VALID_RECOGNIZED' || status === 'SUCCESSFUL' || status === 'OK';

  function sv(f) {
    var v = f && f.value ? String(f.value) : (typeof f === 'string' ? f : null);
    // Microblink returns "_NONE" sentinels (e.g. COUNTRY_NONE) for unrecognised fields — hide them.
    if (v && v.endsWith('_NONE')) return null;
    return v && v.trim() ? v : null;
  }

  var pairs = [
    ['First Name',    sv(r.firstName)],
    ['Last Name',     sv(r.lastName)],
    ['Full Name',     sv(r.fullName)],
    ['Date of Birth', sv(r.dateOfBirth)],
    ['Sex',           sv(r.sex)],
    ['Nationality',   sv(r.nationality)],
    ['Document No',   sv(r.documentNumber)],
    ['Expiry',        sv(r.dateOfExpiry)],
    // classInfo holds country/type; fall back to top-level strings for older API shapes
    ['Country',       sv(r.classInfo && r.classInfo.country) || sv(r.country)],
    ['Doc Type',      sv(r.classInfo && r.classInfo.type)    || sv(r.documentType)],
    ['Address',       sv(r.address)],
    ['MRZ',           sv(r.mrz && r.mrz.mrzText)],
  ].filter(function (p) { return p[1]; });

  // Build status header
  var statusHtml = '';
  if (status) {
    var sColor = statusOk ? '#2ed573' : '#ff4757';
    statusHtml = '<span style="font-size:10px;color:' + sColor + ';margin-left:8px;">' +
                 status + '</span>';
  }

  var inner = '';
  if (pairs.length) {
    pairs.forEach(function (p) {
      inner += '<span class="ocr-key">' + p[0] + '</span>' +
               '<span class="ocr-val">' + p[1] + '</span>';
    });
    inner = '<div class="ocr-fields">' + inner + '</div>';
  } else {
    // No known fields extracted — always dump the raw response so we can
    // see the real recognitionStatus value and response shape.
    inner = '<pre style="color:#aaa;font-size:10px;white-space:pre-wrap;overflow:auto;max-height:240px;">' +
            JSON.stringify(data, null, 2).slice(0, 4000) + '</pre>';
  }

  ocrDetailsEl.style.display = 'block';
  ocrDetailsEl.innerHTML = '<div class="ocr-hdr">📋 OCR Result' + statusHtml + '</div>' + inner;
}

// ── Document Guru (Anthropic Claude Vision) ───────────────────────────────

const GURU_SYSTEM_PROMPT = `You are a universal document classifier and data extractor.

Input: one or more images representing a single document:
- Government ID card (front only, or front and back photos),
- Passport (photo page, or photo page + additional page),
- Proof-of-address documents such as utility bills, bank statements, tax letters,
- Or other document types.

Your job:
1) Classify the document.
2) Extract structured fields according to a fixed JSON schema.
3) Return ONLY one JSON object following that schema exactly.

RULES
1. Always output a single valid JSON object. Do not include explanations, comments, or markdown.
2. Use the JSON schema exactly as provided: never add or remove keys, never change key names.
3. If a field is not present, unreadable, or uncertain, set it to null, not a guess.
4. Use YYYY-MM-DD for all dates where possible; otherwise use null.
5. For ID or passport documents:
   - Set "document_category" to "id_card" or "passport".
   - Fill fields in "id_passport_data" as fully as possible.
   - Leave all fields in "proof_of_address_data" as null.
6. For proof-of-address documents (utility bill, bank statement, etc.):
   - Set "document_category" to "proof_of_address".
   - Set "document_type" to one of: utility_bill, bank_statement, marriage_certificate, birth_certificate, school_diploma, criminal_record, notary_apostille or null if no match.
   - Fill fields in "proof_of_address_data" as fully as possible.
   - Leave all fields in "id_passport_data" as null.
7. For any other document: "document_category" as "other". All id/poa fields null. Put all readable text into "raw_ocr_text".
8. If multiple images are provided (e.g. front and back of ID), treat them as parts of the SAME document and combine information across images.
9. Preserve accents and special characters as they appear when readable.
10. Keep the response concise and under 900 tokens while still filling all applicable fields.`;

const GURU_SCHEMA = `{
  "document_category": null,
  "classification_confidence": null,
  "id_passport_data": {
    "document_type": null,
    "issuing_country": null,
    "document_number": null,
    "mrz_lines": null,
    "person": {
      "full_name": null, "surname": null, "given_names": null,
      "sex": null, "date_of_birth": null, "place_of_birth": null,
      "nationality": null, "personal_number": null
    },
    "document_details": {
      "date_of_issue": null, "date_of_expiry": null,
      "issuing_authority": null, "card_type_label": null, "version_or_series": null
    },
    "address": {
      "full_address": null, "street": null, "city": null,
      "postal_code": null, "region_or_state": null, "country": null
    }
  },
  "proof_of_address_data": {
    "document_type": null, "issuer_name": null,
    "statement_date": null, "reference_period": null,
    "recipient_name": null,
    "recipient_address": {
      "full_address": null, "street": null, "city": null,
      "postal_code": null, "region_or_state": null, "country": null
    },
    "account_or_reference_number": null,
    "amount_due": null, "currency": null, "due_date": null
  },
  "raw_ocr_text": null
}`;

async function sendToGuru() {
  var _sides = capturedSides.length ? capturedSides : _lastCompletedSides;
  if (!_sides.length) { alert('No capture available.'); return; }

  guruBtn.disabled = true;
  guruBtn.innerHTML = '<span class="api-spin"></span> Analysing…';
  showApiWait('Anthropic');

  try {
    var front     = _sides.find(function (cr) { return cr.sideIndex === 0; });
    var back      = _sides.find(function (cr) { return cr.sideIndex === 1; });
    var frontBlob = front ? (front.documentImage || front.image) : null;
    var backBlob  = back  ? (back.documentImage  || back.image)  : null;
    if (!frontBlob) throw new Error('No front image available');

    // Build image content blocks
    var imageBlocks = [];
    var frontB64 = await blobToBase64(frontBlob);
    imageBlocks.push({
      type: 'image',
      source: { type: 'base64', media_type: 'image/jpeg', data: frontB64 },
    });
    if (backBlob) {
      var backB64 = await blobToBase64(backBlob);
      imageBlocks.push({
        type: 'image',
        source: { type: 'base64', media_type: 'image/jpeg', data: backB64 },
      });
    }

    var userContent = [
      { type: 'text', text: 'Extract data from this document. Return ONLY one JSON object following this schema exactly:\n\n' + GURU_SCHEMA },
    ].concat(imageBlocks);

    var proxyBase = document.getElementById('cfgLivenessProxy').value.trim() || 'http://localhost:3001';
    var resp = await fetch(proxyBase + '/anthropic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 1024,
        temperature: 0.1,
        system:     GURU_SYSTEM_PROMPT,
        messages:   [{ role: 'user', content: userContent }],
      }),
    });
    if (!resp.ok) {
      var errBody = await resp.text();
      throw new Error('HTTP ' + resp.status + ': ' + errBody.slice(0, 200));
    }
    var data = await resp.json();

    // Extract text from response
    var textParts = (data.content || []).filter(function (b) { return b.type === 'text'; });
    if (!textParts.length) throw new Error('No text in Claude response');
    var rawText = textParts[0].text.trim();

    // Parse JSON (strip markdown fences if present)
    if (rawText.startsWith('```')) rawText = rawText.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '');
    var parsed = JSON.parse(rawText);

    if (captureHistory.length) captureHistory[0].guruResult = parsed;
    renderGuruDetails(parsed);
    renderHistory();
  } catch (err) {
    guruDetailsEl.style.display = 'block';
    guruDetailsEl.innerHTML =
      '<div class="guru-hdr">Document Guru Error</div>' +
      '<div style="color:#ff4757;font-size:11px;">' + err.message + '</div>';
  } finally {
    hideApiWait();
    guruBtn.disabled = false;
    guruBtn.innerHTML = 'Doc.Guru';
  }
}

function renderGuruDetails(data) {
  if (!data) return;
  var pairs = [];
  var cat = data.document_category;
  var conf = data.classification_confidence;
  pairs.push(['Category', cat || '–']);
  if (conf != null) pairs.push(['Confidence', (conf * 100).toFixed(0) + '%']);

  // ID / Passport fields
  var id = data.id_passport_data;
  if (id && (cat === 'id_card' || cat === 'passport')) {
    if (id.document_type)    pairs.push(['Doc Type', id.document_type]);
    if (id.issuing_country)  pairs.push(['Country', id.issuing_country]);
    if (id.document_number)  pairs.push(['Doc Number', id.document_number]);
    var p = id.person || {};
    if (p.full_name)       pairs.push(['Full Name', p.full_name]);
    if (p.surname)         pairs.push(['Surname', p.surname]);
    if (p.given_names)     pairs.push(['Given Names', p.given_names]);
    if (p.sex)             pairs.push(['Sex', p.sex]);
    if (p.date_of_birth)   pairs.push(['Date of Birth', p.date_of_birth]);
    if (p.place_of_birth)  pairs.push(['Place of Birth', p.place_of_birth]);
    if (p.nationality)     pairs.push(['Nationality', p.nationality]);
    if (p.personal_number) pairs.push(['Personal No', p.personal_number]);
    var dd = id.document_details || {};
    if (dd.date_of_issue)     pairs.push(['Issued', dd.date_of_issue]);
    if (dd.date_of_expiry)    pairs.push(['Expiry', dd.date_of_expiry]);
    if (dd.issuing_authority) pairs.push(['Authority', dd.issuing_authority]);
    if (dd.card_type_label)   pairs.push(['Card Label', dd.card_type_label]);
    var addr = id.address || {};
    if (addr.full_address) pairs.push(['Address', addr.full_address]);
    if (id.mrz_lines)     pairs.push(['MRZ', id.mrz_lines]);
  }

  // Proof of Address fields
  var poa = data.proof_of_address_data;
  if (poa && cat === 'proof_of_address') {
    if (poa.document_type)   pairs.push(['Doc Type', poa.document_type]);
    if (poa.issuer_name)     pairs.push(['Issuer', poa.issuer_name]);
    if (poa.statement_date)  pairs.push(['Date', poa.statement_date]);
    if (poa.recipient_name)  pairs.push(['Recipient', poa.recipient_name]);
    var ra = poa.recipient_address || {};
    if (ra.full_address)     pairs.push(['Address', ra.full_address]);
    if (ra.city)             pairs.push(['City', ra.city]);
    if (ra.postal_code)      pairs.push(['Postal Code', ra.postal_code]);
    if (ra.country)          pairs.push(['Country', ra.country]);
    if (poa.account_or_reference_number) pairs.push(['Account/Ref', poa.account_or_reference_number]);
    if (poa.amount_due)      pairs.push(['Amount Due', poa.amount_due + (poa.currency ? ' ' + poa.currency : '')]);
    if (poa.due_date)        pairs.push(['Due Date', poa.due_date]);
  }

  // Raw OCR text
  if (data.raw_ocr_text && cat === 'other') {
    pairs.push(['Raw Text', data.raw_ocr_text]);
  }

  var inner = '';
  if (pairs.length) {
    pairs.forEach(function (p) {
      inner += '<span class="ocr-key">' + p[0] + '</span>' +
               '<span class="ocr-val">' + p[1] + '</span>';
    });
    inner = '<div class="ocr-fields">' + inner + '</div>';
  } else {
    inner = '<pre style="color:#aaa;font-size:10px;white-space:pre-wrap;overflow:auto;max-height:240px;">' +
            JSON.stringify(data, null, 2).slice(0, 4000) + '</pre>';
  }

  guruDetailsEl.style.display = 'block';
  guruDetailsEl.innerHTML = '<div class="guru-hdr">🧠 Document Guru Result</div>' + inner;
}

// ── Button handlers ────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => startCapture(false));

stopBtn.addEventListener('click', () => {
  destroySnap();
  showCameraMode();
  startBtn.disabled        = false;
  stopBtn.disabled         = true;
  captureBtn.style.display     = 'none';  // always hide on stop
  captureBtn.disabled          = true;
  if (_autoRestartTimer) { clearTimeout(_autoRestartTimer); _autoRestartTimer = null; }
  banner._enabled = false; banner.className = ''; _bannerShownText = null; _bannerAnimating = false; _bannerPending = null;
  scoreEl.textContent      = '–';
  scoreEl.style.color      = '#fff';
  hintBox.style.display    = 'none';
});

captureBtn.addEventListener('click', () => { if (snap) snap.capture(); });

tabFull.addEventListener('click', () => {
  tabFull.classList.add('active'); tabDoc.classList.remove('active');
  const u = sideObjectUrls[activeSide];
  showResultImage(u && u.full);
  hideApiActions();
});
tabDoc.addEventListener('click', () => {
  tabDoc.classList.add('active'); tabFull.classList.remove('active');
  const u = sideObjectUrls[activeSide];
  showResultImage(u && u.doc);
  showApiActions();
});

livenessBtn.addEventListener('click', checkLiveness);
ocrBtn.addEventListener('click',      sendToOCR);
guruBtn.addEventListener('click',     sendToGuru);

applyConfig.addEventListener('click', () => {
  saveSettings();
  startCapture(false);
  applyConfig.closest('details').open = false;
});

// Auto-save API key on change so it persists without needing Apply
document.getElementById('cfgLivenessProxy').addEventListener('input', saveSettings);
</script>
