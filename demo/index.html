<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docuSnap — Document Capture Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100dvh;
      padding: 10px;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #00d9ff;
      font-size: 1.3em;
    }

    /* ─────────────────── Capture area ─────────────────── */
    /* Default (portrait / narrow): stack vertically */
    .capture-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Landscape / wide: side by side */
    @media (orientation: landscape) and (min-width: 769px) {
      .capture-area {
        flex-direction: row;
        align-items: flex-start;
        gap: 15px;
      }
      .video-container {
        flex: 1;
        min-width: 0;
        max-height: calc(100dvh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #canvas {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: calc(100dvh - 80px);
        border-radius: 8px;
      }
      .status-pane {
        width: 300px;
        flex-shrink: 0;
        max-height: calc(100dvh - 80px);
        overflow-y: auto;
      }
    }

    /* Portrait: video fills container width, height clipped */
    @media (orientation: portrait), (max-width: 768px) {
      .video-container {
        max-height: 50dvh;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 8px;
      }
    }

    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    #video { display: none; }
    #canvas { display: block; }

    /* ─────────────────── Instruction banner ─────────────────── */
    #instructionBanner {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 20px;
      white-space: nowrap;
      pointer-events: none;
      max-width: 90%;
      text-align: center;
      display: none;
    }
    #instructionBanner.escalated { color: #ffd700; }
    #instructionBanner.good      { color: #2ed573; }

    /* ─────────────────── Face badge ─────────────────── */
    #faceBadge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.65);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px; font-weight: 600;
      display: none;
      pointer-events: none;
    }
    #faceBadge.present { color: #2ed573; }
    #faceBadge.absent  { color: #ff4757; }
    #faceBadge.unknown { color: #aaa;    }

    /* ─────────────────── Status pane ─────────────────── */
    .status-pane {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─────────────────── Controls ─────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:hover   { transform: scale(1.02); }
    button:active  { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #startBtn    { background: #00d9ff; color: #000; }
    #stopBtn     { background: #ff4757; color: #fff; }
    #captureBtn  { background: #2ed573; color: #000; }
    #nextSideBtn { background: #ffa502; color: #000; display: none; }

    /* ─────────────────── Side indicator ─────────────────── */
    #sideIndicator {
      display: none;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: #aaa;
      background: #0f0f23;
      border-radius: 6px;
    }

    /* ─────────────────── Real-time quality panel ─────────────────── */
    .status {
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      text-align: center;
    }
    .status-item   { margin: 5px 0; }
    .status-label  { color: #888; font-size: 12px; }
    .status-value  { font-size: 16px; font-weight: bold; }

    .quality-indicators { margin-top: 10px; display: grid; gap: 5px; }

    .indicator {
      display: flex;
      align-items: center;
      background: #0f0f23;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .ind-label  { flex: 1; color: #888; }
    .ind-value  { width: 55px; text-align: right; font-family: monospace; color: #fff; font-size: 11px; }
    .ind-status { margin-left: 6px; font-size: 12px; }

    #faceIndicatorRow { display: none; }

    /* ─────────────────── Hint box ─────────────────── */
    #hintBox {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      background: rgba(255,71,87,0.15);
      border-left: 3px solid #ff4757;
      text-align: left;
      display: none;
    }
    #hintBox.good    { background: rgba(46,213,115,0.15); border-left-color: #2ed573; }
    #hintBox.neutral { background: rgba(0,217,255,0.12);  border-left-color: #00d9ff; }

    /* ─────────────────── Config section ─────────────────── */
    .config-section { font-size: 12px; }
    .config-section summary { cursor: pointer; color: #00d9ff; padding: 6px 0; }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .config-grid label { display: flex; flex-direction: column; gap: 3px; color: #888; font-size: 11px; }
    .config-grid input {
      padding: 6px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f23;
      color: #fff;
      font-size: 12px;
      width: 100%;
    }
    .config-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #00d9ff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }
    .config-btn:hover { background: #00c4e6; }

    /* ─────────────────── Section titles ─────────────────── */
    .section-title {
      color: #00d9ff;
      font-size: 1.05em;
      font-weight: 600;
      margin-bottom: 8px;
    }

    /* ─────────────────── Captured Document section ─────────────────── */
    .captured-section { margin-top: 18px; }

    .captured-card {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
    }

    #result {
      background: #0f0f23;
      border-radius: 8px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 13px;
      overflow: hidden;
    }
    #result img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }

    #capturedTabs {
      display: none;           /* shown as flex when capture available */
      gap: 6px;
      margin-top: 8px;
      justify-content: center;
    }
    .tab-btn {
      padding: 5px 14px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f23;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
    .tab-btn.active { background: #00d9ff; color: #000; border-color: #00d9ff; }

    /* Quality snapshot for captured card */
    #capturedQuality {
      display: none;           /* shown as grid when capture available */
      gap: 4px;
      margin-top: 8px;
    }
    .cap-ind {
      display: flex;
      align-items: center;
      background: #0f0f23;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .cap-ind .ind-label  { flex: 1; color: #888; }
    .cap-ind .ind-value  { width: 50px; text-align: right; font-family: monospace; color: #fff; }
    .cap-ind .ind-status { margin-left: 5px; font-size: 11px; }

    /* ─────────────────── Capture History section ─────────────────── */
    .history-section {
      margin-top: 22px;
      padding-bottom: 24px;
    }
    .history-divider {
      border: none;
      border-top: 1px solid #2a2a44;
      margin-bottom: 14px;
    }
    #historyList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-empty {
      color: #555;
      font-size: 12px;
      text-align: center;
      padding: 16px 0;
    }
    .history-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #16213e;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .history-thumb {
      width: 72px;
      flex-shrink: 0;
    }
    .history-thumb img {
      width: 72px;
      height: auto;
      display: block;
      border-radius: 4px;
      background: #0f0f23;
    }
    .history-thumb .no-thumb {
      width: 72px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      border-radius: 4px;
      color: #444;
      font-size: 10px;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-ts {
      color: #666;
      font-size: 10px;
      margin-bottom: 5px;
    }
    .history-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .hbadge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: #0f0f23;
      white-space: nowrap;
    }
    .hbadge.pass    { color: #2ed573; }
    .hbadge.fail    { color: #ff4757; }
    .hbadge.neutral { color: #aaa;    }

    /* ─────────────────── Loading ─────────────────── */
    .loading { text-align: center; padding: 40px; }
    .loading-spinner {
      border: 4px solid #333;
      border-top: 4px solid #00d9ff;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ─────────────────── Fallback / file mode ─────────────────── */
    .video-container.fallback-mode {
      background: transparent;
      border-radius: 0;
      overflow: visible;
      max-height: none;
    }
    #fallbackContainer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 14px;
    }
    .docusnap-fallback-btn {
      width: 100%;
      max-width: 300px;
      padding: 14px 24px;
      background: #00d9ff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-family: inherit;
    }
    .docusnap-fallback-btn:hover  { transform: scale(1.02); }
    .docusnap-fallback-btn:active { transform: scale(0.98); }
    .docusnap-fallback-btn-secondary {
      background: #2a2a44;
      color: #ccc;
      border: 1px solid #444;
    }
    .docusnap-fallback-status {
      color: #ccc;
      font-size: 13px;
      text-align: center;
      padding: 0 10px;
      min-height: 18px;
      line-height: 1.4;
    }
    .docusnap-fallback-preview { width: 100%; max-width: 380px; }
    .docusnap-fallback-preview img {
      width: 100%; height: auto;
      border-radius: 8px;
      border: 2px solid #2a2a44;
      display: block;
    }
    .docusnap-fallback-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 300px;
      gap: 8px;
    }
    .docusnap-fallback-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 30px;
    }
    .docusnap-fallback-spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a44;
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .docusnap-fallback-loading-text { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 docuSnap</h1>

    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Initialising…</p>
    </div>

    <div id="app" style="display:none;">

      <!-- ══════════════ Capture area ══════════════ -->
      <div class="capture-area">

        <!-- Camera / fallback pane -->
        <div class="video-container" id="videoContainer">
          <video id="video" playsinline></video>
          <canvas id="canvas" width="640" height="480"></canvas>
          <div id="fallbackContainer" style="display:none;"></div>
          <div id="instructionBanner"></div>
          <div id="faceBadge">👤 –</div>
        </div>

        <!-- Status pane: controls → quality → settings -->
        <div class="status-pane">

          <!-- Buttons: right under video in portrait, top of sidebar in landscape -->
          <div class="controls">
            <button id="startBtn">▶ Start Camera</button>
            <button id="stopBtn"    disabled>⏹ Stop</button>
            <button id="captureBtn" disabled>📸 Capture</button>
            <button id="nextSideBtn">↩ Scan Other Side</button>
          </div>

          <!-- Side progress (shown when sides > 1) -->
          <div id="sideIndicator"></div>

          <!-- Real-time quality assessment -->
          <div class="status">
            <div class="status-item">
              <div class="status-label">Real-time quality assessment</div>
              <div class="status-value" id="score">–</div>
            </div>

            <div id="hintBox"></div>

            <div class="quality-indicators">
              <div class="indicator">
                <span class="ind-label">Sharpness</span>
                <span class="ind-value"  id="indSharpness">–</span>
                <span class="ind-status" id="indSharpnessStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Brightness</span>
                <span class="ind-value"  id="indBrightness">–</span>
                <span class="ind-status" id="indBrightnessStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Glare</span>
                <span class="ind-value"  id="indGlare">–</span>
                <span class="ind-status" id="indGlareStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Doc Size</span>
                <span class="ind-value"  id="indDocSize">–</span>
                <span class="ind-status" id="indDocSizeStatus">⚪</span>
              </div>
              <!-- Face row — revealed when face detection is active -->
              <div class="indicator" id="faceIndicatorRow">
                <span class="ind-label">Face Present</span>
                <span class="ind-value"  id="indFace">–</span>
                <span class="ind-status" id="indFaceStatus">⚪</span>
              </div>
            </div>
          </div>

          <!-- Settings -->
          <div class="config-section">
            <details>
              <summary>⚙️ Settings</summary>
              <div class="config-grid">
                <label>Doc Type
                  <select id="cfgDocType" style="padding:6px;border:1px solid #333;border-radius:4px;background:#0f0f23;color:#fff;font-size:12px;width:100%;">
                    <option value="any">Any</option>
                    <option value="id">ID Card</option>
                    <option value="passport">Passport</option>
                    <option value="document">Document (A4)</option>
                  </select>
                </label>
                <label>Capture Mode
                  <select id="cfgMode" style="padding:6px;border:1px solid #333;border-radius:4px;background:#0f0f23;color:#fff;font-size:12px;width:100%;">
                    <option value="smart">Smart (auto-detect)</option>
                    <option value="auto">Auto capture</option>
                    <option value="manual">Manual capture</option>
                    <option value="file">File / WebView</option>
                  </select>
                </label>
                <label>Sides
                  <select id="cfgSides" style="padding:6px;border:1px solid #333;border-radius:4px;background:#0f0f23;color:#fff;font-size:12px;width:100%;">
                    <option value="1">1 side</option>
                    <option value="2">2 sides</option>
                  </select>
                </label>
                <label>Face Detection
                  <select id="cfgFace" style="padding:6px;border:1px solid #333;border-radius:4px;background:#0f0f23;color:#fff;font-size:12px;width:100%;">
                    <option value="off">Off</option>
                    <option value="detect" selected>Detect (no requirement)</option>
                    <option value="require">Require face present</option>
                  </select>
                </label>
                <label>Sharpness Min (0-100)
                  <input type="number" id="cfgSharpness"  value="40" min="0" max="100">
                </label>
                <label>Brightness Min (0-100)
                  <input type="number" id="cfgBrightness" value="40" min="0" max="100">
                </label>
                <label>Glare Max (0-100)
                  <input type="number" id="cfgGlare"      value="10" min="0" max="100">
                </label>
                <label>Doc Size Min (0-100)
                  <input type="number" id="cfgDocSize"    value="40" min="0" max="100">
                </label>
              </div>
              <button id="applyConfigBtn" class="config-btn">Apply &amp; Restart</button>
            </details>
          </div>

        </div><!-- end .status-pane -->
      </div><!-- end .capture-area -->

      <!-- ══════════════ Captured Document (full width) ══════════════ -->
      <section class="captured-section">
        <p class="section-title">Captured Document</p>
        <div class="captured-card">
          <!-- Image preview -->
          <div id="result"><span>No document captured yet</span></div>

          <!-- Full Frame / Cropped ID tabs (shown only after capture) -->
          <div id="capturedTabs">
            <button class="tab-btn" id="tabDoc">Cropped ID</button>
            <button class="tab-btn" id="tabFull">Full Frame</button>
          </div>

          <!-- Quality snapshot for the captured image -->
          <div id="capturedQuality"></div>
        </div>
      </section>

      <!-- ══════════════ Capture History (full width) ══════════════ -->
      <section class="history-section">
        <hr class="history-divider">
        <p class="section-title">Capture History</p>
        <div id="historyList">
          <p class="history-empty">No captures yet</p>
        </div>
      </section>

    </div><!-- end #app -->
  </div><!-- end .container -->

  <script src="../src/docusnap.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  });

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const video             = document.getElementById('video');
  const canvas            = document.getElementById('canvas');
  const result            = document.getElementById('result');
  const capturedTabs      = document.getElementById('capturedTabs');
  const tabFull           = document.getElementById('tabFull');
  const tabDoc            = document.getElementById('tabDoc');
  const capturedQualityEl = document.getElementById('capturedQuality');
  const sideIndicator     = document.getElementById('sideIndicator');
  const scoreEl           = document.getElementById('score');
  const hintBox           = document.getElementById('hintBox');
  const banner            = document.getElementById('instructionBanner');
  const faceBadge         = document.getElementById('faceBadge');
  const historyListEl     = document.getElementById('historyList');

  const indSharpness        = document.getElementById('indSharpness');
  const indSharpnessStatus  = document.getElementById('indSharpnessStatus');
  const indBrightness       = document.getElementById('indBrightness');
  const indBrightnessStatus = document.getElementById('indBrightnessStatus');
  const indGlare            = document.getElementById('indGlare');
  const indGlareStatus      = document.getElementById('indGlareStatus');
  const indDocSize          = document.getElementById('indDocSize');
  const indDocSizeStatus    = document.getElementById('indDocSizeStatus');
  const faceRow             = document.getElementById('faceIndicatorRow');
  const indFace             = document.getElementById('indFace');
  const indFaceStatus       = document.getElementById('indFaceStatus');

  const startBtn       = document.getElementById('startBtn');
  const stopBtn        = document.getElementById('stopBtn');
  const captureBtn     = document.getElementById('captureBtn');
  const nextSideBtn    = document.getElementById('nextSideBtn');
  const applyConfig    = document.getElementById('applyConfigBtn');
  const videoContainer = document.getElementById('videoContainer');
  const fallbackCont   = document.getElementById('fallbackContainer');

  // ── State ─────────────────────────────────────────────────────────────────
  let snap           = null;
  let stream         = null;
  let capturedImages = { full: null, doc: null };   // blob URLs for current capture display
  let activeSide     = 0;

  // In-memory capture history — newest first, max 20 entries
  const MAX_HISTORY    = 20;
  const captureHistory = [];

  // ── Build config from UI ───────────────────────────────────────────────────
  function buildConfig() {
    const docType = document.getElementById('cfgDocType').value;
    const mode    = document.getElementById('cfgMode').value;
    const sides   = parseInt(document.getElementById('cfgSides').value, 10) || 1;
    const faceOpt = document.getElementById('cfgFace').value;

    const nv = (id, def) => { var v = parseFloat(document.getElementById(id).value); return isNaN(v) ? def : v; };
    const q = {
      sharpness:  nv('cfgSharpness',  40),
      brightness: nv('cfgBrightness', 40),
      glare:      nv('cfgGlare',      10),
      size:       nv('cfgDocSize',    40),
    };

    const faceConfig = faceOpt === 'off'
      ? { detect: false }
      : { detect: true, requirePresent: faceOpt === 'require' ? true : null, minConfidence: 0.6 };

    return { docType, mode, sides, quality: q, faceConfig };
  }

  // ── Init / restart ─────────────────────────────────────────────────────────
  async function initApp() {
    const capability = DocuSnap.detectCapability();
    if (capability === 'file') {
      startBtn.style.display   = 'none';
      stopBtn.style.display    = 'none';
      captureBtn.style.display = 'none';
      await startCapture(true);
    }
  }

  async function startCapture(forceFile) {
    destroySnap();
    activeSide = 0;
    revokeCapturedUrls();
    resetResultPanel();

    const cfg = buildConfig();

    // Face UI visibility
    const faceActive = cfg.faceConfig.detect;
    faceRow.style.display   = faceActive ? '' : 'none';
    faceBadge.style.display = faceActive ? '' : 'none';
    if (faceActive) {
      faceBadge.textContent = '👤 –';
      faceBadge.className   = 'unknown';
    }

    // Side indicator
    sideIndicator.style.display = cfg.sides > 1 ? '' : 'none';
    if (cfg.sides > 1) updateSideIndicator(0, cfg.sides);

    snap = new DocuSnap({
      documentType:      cfg.docType,
      captureMode:       forceFile ? 'file' : cfg.mode,
      sides:             cfg.sides,
      quality:           cfg.quality,
      face:              cfg.faceConfig,
      fallbackContainer: fallbackCont,
      onFrame:   handleFrame,
      onCapture: handleCapture,
      onError:   handleError,
    });

    if (forceFile || DocuSnap.detectCapability() === 'file') {
      showFallbackMode();
      await snap.start(null, null);
    } else {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        showCameraMode();
        await snap.start(video, canvas);

        startBtn.disabled        = true;
        stopBtn.disabled         = false;
        captureBtn.style.display = cfg.mode === 'manual' ? '' : 'none';
        captureBtn.disabled      = false;
        banner.style.display     = '';
      } catch (err) {
        console.warn('Camera unavailable (' + err.name + ') — switching to file mode');
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        showFallbackMode();
        await snap.start(null, null);
      }
    }
  }

  function destroySnap() {
    if (snap)   { snap.destroy(); snap = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
  }

  // ── Display mode helpers ───────────────────────────────────────────────────
  function showCameraMode() {
    canvas.style.display       = '';
    fallbackCont.style.display = 'none';
    videoContainer.classList.remove('fallback-mode');
    banner.style.display = '';
  }

  function showFallbackMode() {
    canvas.style.display       = 'none';
    fallbackCont.style.display = '';
    videoContainer.classList.add('fallback-mode');
    banner.style.display     = 'none';
    startBtn.style.display   = 'none';
    stopBtn.style.display    = 'none';
    captureBtn.style.display = 'none';
  }

  // ── Frame handler ──────────────────────────────────────────────────────────
  function handleFrame(frame) {
    // Instruction banner
    if (banner.style.display !== 'none') {
      banner.textContent   = frame.hint;
      banner.style.display = '';
      banner.className =
        frame.instructionCode === 'CONFIRMED'  ? 'good'
      : frame.instructionCode === 'HOLD_STILL' ? 'good'
      : frame.hintEscalated ? 'escalated' : '';
    }

    // State label
    const IC = DocuSnap.InstructionCode;
    if (frame.instructionCode === IC.CONFIRMED || frame.instructionCode === IC.HOLD_STILL) {
      scoreEl.textContent = frame.instructionCode === IC.HOLD_STILL ? '✅ Hold still…' : '✅ Ready';
      scoreEl.style.color = '#2ed573';
    } else {
      const IC_LABELS = { SHARPEN: 'TOO BLURRY' };
      const rawLabel  = frame.instructionCode.replace(/_/g, ' ');
      scoreEl.textContent = IC_LABELS[frame.instructionCode] || rawLabel;
      scoreEl.style.color = '#ff4757';
    }

    // Hint box
    const isGood = (frame.instructionCode === IC.CONFIRMED || frame.instructionCode === IC.HOLD_STILL);
    hintBox.style.display = '';
    hintBox.textContent   = frame.hint;
    hintBox.className     = isGood ? 'good' : (frame.hintEscalated ? '' : 'neutral');

    // Quality indicators
    const q = frame.quality;
    setIndicator(indSharpness,  indSharpnessStatus,  q.sharpness,  !q.failing.includes('sharpness'),  '%');
    setIndicator(indBrightness, indBrightnessStatus, q.brightness, !q.failing.includes('brightness'), '%');
    setIndicator(indGlare,      indGlareStatus,      q.glare,      !q.failing.includes('glare'),      '%');
    setIndicator(indDocSize,    indDocSizeStatus,     q.size,       !q.failing.includes('size'),       '%');

    // Face detection row
    if (frame.face !== null && frame.face !== undefined) {
      const requireFace = document.getElementById('cfgFace').value === 'require';
      faceRow.style.display   = '';
      faceBadge.style.display = '';
      if (frame.face.present === null) {
        indFace.textContent       = '–';
        indFaceStatus.textContent = '⚪';
        faceBadge.textContent     = '👤 –';
        faceBadge.className       = 'unknown';
      } else if (frame.face.present) {
        indFace.textContent       = 'Yes';
        indFaceStatus.textContent = requireFace ? '✅' : '⚪';
        faceBadge.textContent     = '👤 ✓';
        faceBadge.className       = 'present';
      } else {
        indFace.textContent       = 'No';
        indFaceStatus.textContent = requireFace ? '❌' : '⚪';
        faceBadge.textContent     = '👤 ✗';
        faceBadge.className       = 'absent';
      }
    }
  }

  function setIndicator(valueEl, statusEl, value, pass, suffix) {
    suffix = suffix || '';
    valueEl.textContent  = typeof value === 'number' ? value.toFixed(0) + suffix : value;
    statusEl.textContent = pass ? '✅' : '❌';
  }

  // ── Capture handler ────────────────────────────────────────────────────────
  function handleCapture(cr) {
    activeSide = cr.sideIndex;
    revokeCapturedUrls();

    // Blob URLs for the live "Captured Document" card
    capturedImages.full = cr.image         ? URL.createObjectURL(cr.image)         : null;
    capturedImages.doc  = cr.documentImage ? URL.createObjectURL(cr.documentImage) : null;

    // Default to Cropped ID; fall back to Full Frame when no de-skew
    if (capturedImages.doc) {
      showResultImage(capturedImages.doc);
      capturedTabs.style.display = 'flex';
      tabDoc.classList.add('active');
      tabFull.classList.remove('active');
    } else {
      showResultImage(capturedImages.full);
      capturedTabs.style.display = 'none';
    }

    // Quality snapshot below the image
    renderCapturedQuality(cr.quality, cr.face);

    // Add to scrollable history (uses its own independent blob URL)
    addToHistory(cr);

    // Flash
    result.style.boxShadow = '0 0 30px #2ed573';
    setTimeout(() => { result.style.boxShadow = 'none'; }, 500);

    // Update state label
    scoreEl.textContent = '✅ Captured!';
    scoreEl.style.color  = '#2ed573';

    // Update face indicators from capture result
    if (cr.face && cr.face.present !== null) {
      const requireFace = document.getElementById('cfgFace').value === 'require';
      indFace.textContent       = cr.face.present ? 'Yes' : 'No';
      indFaceStatus.textContent = requireFace ? (cr.face.present ? '✅' : '❌') : '⚪';
      faceBadge.textContent     = cr.face.present ? '👤 ✓' : '👤 ✗';
      faceBadge.className       = cr.face.present ? 'present' : 'absent';
    }

    // Multi-side: show "Scan Other Side" button
    if (!cr.isLastSide) {
      nextSideBtn.style.display = '';
      updateSideIndicator(cr.sideIndex, cr.sidesTotal);
    } else {
      nextSideBtn.style.display = 'none';
      if (cr.sidesTotal > 1) updateSideIndicator(cr.sideIndex, cr.sidesTotal);
    }

    console.log('[demo] Capture:', {
      sideIndex: cr.sideIndex, isLastSide: cr.isLastSide,
      captureMode: cr.captureMode, quality: cr.quality,
      hasDoc: !!cr.documentImage, hasFace: cr.face,
    });
  }

  function handleError(err) {
    console.error('[demo] DocuSnap error:', err);
    scoreEl.textContent = '⚠ ' + err.code;
    scoreEl.style.color  = '#ff4757';
  }

  // ── Captured quality snapshot ──────────────────────────────────────────────
  function renderCapturedQuality(q, face) {
    capturedQualityEl.innerHTML = '';
    if (!q) { capturedQualityEl.style.display = 'none'; return; }

    const metrics = [
      { label: 'Sharpness',  value: q.sharpness,  pass: !q.failing.includes('sharpness'),  suffix: '%' },
      { label: 'Brightness', value: q.brightness, pass: !q.failing.includes('brightness'), suffix: '%' },
      { label: 'Glare',      value: q.glare,       pass: !q.failing.includes('glare'),      suffix: '%' },
      { label: 'Doc Size',   value: q.size,        pass: !q.failing.includes('size'),       suffix: '%' },
    ];
    if (face && face.present !== null) {
      metrics.push({ label: 'Face', value: face.present ? 'Yes' : 'No', pass: face.present === true, suffix: '' });
    }

    capturedQualityEl.style.display = 'grid';
    metrics.forEach(function (m) {
      const row = document.createElement('div');
      row.className = 'cap-ind';
      const val = typeof m.value === 'number' ? m.value.toFixed(0) + m.suffix : m.value;
      row.innerHTML =
        '<span class="ind-label">'  + m.label + '</span>' +
        '<span class="ind-value">'  + val     + '</span>' +
        '<span class="ind-status">' + (m.pass ? '✅' : '❌') + '</span>';
      capturedQualityEl.appendChild(row);
    });
  }

  // ── Capture history ────────────────────────────────────────────────────────
  function addToHistory(cr) {
    // Create an independent blob URL that won't be revoked with capturedImages
    const thumbUrl = cr.documentImage ? URL.createObjectURL(cr.documentImage) : null;

    captureHistory.unshift({
      id:        Date.now(),
      timestamp: new Date(),
      thumbUrl:  thumbUrl,
      quality:   cr.quality,
      face:      cr.face,
      sideIndex: cr.sideIndex,
    });

    // Drop oldest entries and revoke their URLs
    while (captureHistory.length > MAX_HISTORY) {
      const old = captureHistory.pop();
      if (old.thumbUrl) URL.revokeObjectURL(old.thumbUrl);
    }

    renderHistory();
  }

  function renderHistory() {
    historyListEl.innerHTML = '';
    if (captureHistory.length === 0) {
      historyListEl.innerHTML = '<p class="history-empty">No captures yet</p>';
      return;
    }

    captureHistory.forEach(function (entry) {
      const item = document.createElement('div');
      item.className = 'history-item';

      const q       = entry.quality;
      const timeStr = entry.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      let badges = '';
      if (q) {
        badges +=
          badge('Sharp: '  + q.sharpness.toFixed(0)  + '%', !q.failing.includes('sharpness'))  +
          badge('Bright: ' + q.brightness.toFixed(0) + '%', !q.failing.includes('brightness')) +
          badge('Glare: '  + q.glare.toFixed(0)      + '%', !q.failing.includes('glare'))      +
          badge('Size: '   + q.size.toFixed(0)        + '%', !q.failing.includes('size'));
      }
      if (entry.face && entry.face.present !== null) {
        badges += badge('Face: ' + (entry.face.present ? 'Yes' : 'No'), entry.face.present);
      }

      const thumbHtml = entry.thumbUrl
        ? '<img src="' + entry.thumbUrl + '" alt="capture">'
        : '<div class="no-thumb">–</div>';

      item.innerHTML =
        '<div class="history-thumb">' + thumbHtml + '</div>' +
        '<div class="history-info">'  +
          '<div class="history-ts">' + timeStr + ' · Side ' + (entry.sideIndex + 1) + '</div>' +
          '<div class="history-badges">' + badges + '</div>' +
        '</div>';

      historyListEl.appendChild(item);
    });
  }

  function badge(label, pass) {
    return '<span class="hbadge ' + (pass ? 'pass' : 'fail') + '">' + label + '</span>';
  }

  // ── Result / panel helpers ─────────────────────────────────────────────────
  function showResultImage(url) {
    if (!url) { result.innerHTML = '<span>No image available</span>'; return; }
    const img = new Image();
    img.style.cssText = 'width:100%;height:auto;display:block;border-radius:6px;';
    img.onload = function () {
      result.innerHTML = '';
      result.appendChild(img);
    };
    img.src = url;
  }

  function resetResultPanel() {
    result.innerHTML              = '<span>No document captured yet</span>';
    capturedTabs.style.display    = 'none';
    capturedQualityEl.style.display = 'none';
    capturedQualityEl.innerHTML   = '';
    nextSideBtn.style.display     = 'none';
    scoreEl.textContent           = '–';
    scoreEl.style.color           = '#fff';
    hintBox.style.display         = 'none';
    banner.style.display          = 'none';
    banner.textContent            = '';
  }

  function updateSideIndicator(idx, total) {
    sideIndicator.style.display = '';
    const labels = ['Front', 'Back'];
    sideIndicator.textContent =
      'Side ' + (idx + 1) + ' of ' + total +
      (labels[idx] ? ' (' + labels[idx] + ')' : '');
  }

  function revokeCapturedUrls() {
    if (capturedImages.full) { URL.revokeObjectURL(capturedImages.full); capturedImages.full = null; }
    if (capturedImages.doc)  { URL.revokeObjectURL(capturedImages.doc);  capturedImages.doc  = null; }
  }

  // ── Button handlers ────────────────────────────────────────────────────────
  startBtn.addEventListener('click', () => startCapture(false));

  stopBtn.addEventListener('click', () => {
    destroySnap();
    showCameraMode();
    startBtn.disabled     = false;
    stopBtn.disabled      = true;
    captureBtn.disabled   = true;
    banner.style.display  = 'none';
    scoreEl.textContent   = '–';
    scoreEl.style.color   = '#fff';
    hintBox.style.display = 'none';
  });

  captureBtn.addEventListener('click', () => {
    if (snap) snap.capture();
  });

  nextSideBtn.addEventListener('click', () => {
    if (snap) {
      nextSideBtn.style.display = 'none';
      snap.nextSide();
      const cfg = buildConfig();
      updateSideIndicator(activeSide + 1, cfg.sides);
    }
  });

  tabFull.addEventListener('click', () => {
    tabFull.classList.add('active');
    tabDoc.classList.remove('active');
    showResultImage(capturedImages.full);
  });

  tabDoc.addEventListener('click', () => {
    tabDoc.classList.add('active');
    tabFull.classList.remove('active');
    showResultImage(capturedImages.doc);
  });

  applyConfig.addEventListener('click', () => {
    startCapture(false);
    applyConfig.closest('details').open = false;
  });
  </script>
</body>
</html>
