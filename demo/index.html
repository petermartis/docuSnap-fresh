<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Auto-Capture Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 10px;
      overflow-x: hidden;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #00d9ff;
      font-size: 1.3em;
    }
    
    .container {
      max-width: 100%;
      margin: 0 auto;
      height: calc(100vh - 40px);
      height: calc(100dvh - 40px);
      display: flex;
      flex-direction: column;
    }
    
    .capture-area {
      display: flex;
      gap: 15px;
      flex: 1;
      min-height: 0;
    }
    
    /* Portrait mode (default): stack vertically */
    @media (orientation: portrait), (max-width: 768px) {
      .capture-area {
        flex-direction: column;
      }

      .video-container {
        flex: none;
        width: 100%;
        max-height: 50vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* width/height both auto so the canvas respects aspect-ratio (set via JS)
         under both max-width and max-height constraints — handles landscape AND
         portrait camera streams without stretch */
      #canvas {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 50vh;
        display: block;
      }

      .result-container {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
    }

    /* Landscape mode: side by side */
    @media (orientation: landscape) and (min-width: 769px) {
      .capture-area {
        flex-direction: row;
      }

      .video-container {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* aspect-ratio set via JS; width/height auto + max constraints
         let the browser fit the canvas without distortion */
      #canvas {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: calc(100vh - 120px);
        max-height: calc(100dvh - 120px);
      }

      .result-container {
        width: 320px;
        flex-shrink: 0;
        overflow-y: auto;
        max-height: calc(100vh - 120px);
        max-height: calc(100dvh - 120px);
      }
    }
    
    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    
    #video {
      display: none;
    }
    
    #canvas {
      display: block;
      border-radius: 8px;
    }
    
    .result-container {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
    }
    
    .result-container h2 {
      margin-bottom: 10px;
      color: #00d9ff;
      font-size: 1.1em;
    }
    
    #result {
      background: #0f0f23;
      border-radius: 8px;
      padding: 10px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    
    #result img {
      max-width: 100%;
      max-height: 150px;
      height: auto;
      border-radius: 4px;
    }
    
    .controls {
      margin-top: 10px;
      padding: 10px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }
    
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    
    button:hover {
      transform: scale(1.02);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #startBtn {
      background: #00d9ff;
      color: #000;
    }
    
    #stopBtn {
      background: #ff4757;
      color: #fff;
    }
    
    #captureBtn {
      background: #2ed573;
      color: #000;
    }
    
    .status {
      margin-top: 10px;
      padding: 10px;
      background: #0f0f23;
      border-radius: 8px;
      text-align: center;
    }
    
    .status-item {
      margin: 5px 0;
    }
    
    .status-label {
      color: #888;
      font-size: 12px;
    }
    
    .status-value {
      font-size: 16px;
      font-weight: bold;
    }
    
    .progress-bar {
      height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #2ed573);
      transition: width 0.1s ease-out;
      width: 0%;
    }
    
    .issues {
      margin-top: 10px;
      padding: 8px;
      background: rgba(255, 71, 87, 0.2);
      border-radius: 6px;
      border-left: 3px solid #ff4757;
      font-size: 13px;
    }
    
    .issues.good {
      background: rgba(46, 213, 115, 0.2);
      border-left-color: #2ed573;
    }
    
    .issues ul {
      list-style: none;
      padding-left: 0;
    }
    
    .issues li {
      padding: 3px 0;
    }
    
    .quality-indicators {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }
    
    .indicator {
      display: flex;
      align-items: center;
      background: #0f0f23;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .ind-label {
      flex: 1;
      color: #888;
    }
    
    .ind-value {
      width: 60px;
      text-align: right;
      font-family: monospace;
      color: #fff;
      font-size: 11px;
    }
    
    .ind-status {
      margin-left: 6px;
      font-size: 12px;
    }
    
    .config-section {
      margin-top: 12px;
      font-size: 12px;
    }
    
    .config-section summary {
      cursor: pointer;
      color: #00d9ff;
      padding: 6px 0;
    }
    
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    
    .config-grid label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      color: #888;
      font-size: 11px;
    }
    
    .config-grid input {
      padding: 6px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f23;
      color: #fff;
      font-size: 12px;
      width: 100%;
    }
    
    .config-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #00d9ff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }
    
    .config-btn:hover {
      background: #00c4e6;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
    }

    .loading-spinner {
      border: 4px solid #333;
      border-top: 4px solid #00d9ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── Fallback capture UI (WebView / file-input mode) ───────────────────── */

    /* When in fallback mode the video-container becomes a plain flex column.    */
    .video-container.fallback-mode {
      background: transparent;
      border-radius: 0;
      overflow: visible;
      max-height: none;
      flex: 1;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #fallbackContainer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px;
      gap: 14px;
      box-sizing: border-box;
    }

    .docusnap-fallback-btn {
      width: 100%;
      max-width: 300px;
      padding: 14px 24px;
      background: #00d9ff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      font-family: inherit;
    }
    .docusnap-fallback-btn:hover  { transform: scale(1.02); }
    .docusnap-fallback-btn:active { transform: scale(0.98); }

    .docusnap-fallback-btn-secondary {
      background: #2a2a44;
      color: #ccc;
      border: 1px solid #444;
    }

    .docusnap-fallback-status {
      color: #ccc;
      font-size: 13px;
      text-align: center;
      padding: 0 10px;
      min-height: 18px;
      line-height: 1.4;
    }

    .docusnap-fallback-preview {
      width: 100%;
      max-width: 380px;
    }
    .docusnap-fallback-preview img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 2px solid #2a2a44;
      display: block;
    }

    .docusnap-fallback-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 300px;
      gap: 8px;
    }

    /* Spinner shown while analyzing the photo */
    .docusnap-fallback-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 30px;
    }
    .docusnap-fallback-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a44;
      border-top-color: #00d9ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .docusnap-fallback-loading-text {
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 Document Auto-Capture</h1>
    
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
    
    <div id="app" style="display: none;">
      <div class="capture-area">
        <div class="video-container">
          <video id="video" playsinline></video>
          <canvas id="canvas" width="640" height="480"></canvas>
          <!-- Fallback UI: shown instead of canvas in WebView / file-capture mode -->
          <div id="fallbackContainer" style="display:none;"></div>
        </div>
        
        <div class="result-container">
          <h2>Captured Document</h2>
          <div id="result">
            <span>No document captured yet</span>
          </div>
          
          <div class="status">
            <div class="status-item">
              <div class="status-label">Overall Status</div>
              <div class="status-value" id="score">-</div>
            </div>
            
            <div class="quality-indicators" id="qualityIndicators">
              <div class="indicator">
                <span class="ind-label">Sharpness</span>
                <span class="ind-value" id="indSharpness">-</span>
                <span class="ind-status" id="indSharpnessStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Brightness</span>
                <span class="ind-value" id="indBrightness">-</span>
                <span class="ind-status" id="indBrightnessStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Glare</span>
                <span class="ind-value" id="indGlare">-</span>
                <span class="ind-status" id="indGlareStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Doc Size</span>
                <span class="ind-value" id="indDocSize">-</span>
                <span class="ind-status" id="indDocSizeStatus">⚪</span>
              </div>
              <div class="indicator">
                <span class="ind-label">Corners</span>
                <span class="ind-value" id="indCorners">-</span>
                <span class="ind-status" id="indCornersStatus">⚪</span>
              </div>
            </div>
            
            <div id="issues" class="issues" style="display: none;">
              <ul id="issuesList"></ul>
            </div>
          </div>
          
          <div class="config-section">
            <details>
              <summary>⚙️ Threshold Settings</summary>
              <div class="config-grid">
                <label>Sharpness Min (0-100)
                  <input type="number" id="cfgSharpness" value="50" min="0" max="100">
                </label>
                <label>Brightness Min (0-100)
                  <input type="number" id="cfgBrightnessMin" value="50" min="0" max="100">
                </label>
                <label>Glare Max (0-100)
                  <input type="number" id="cfgGlare" value="10" min="0" max="100" step="1">
                </label>
                <label>Glare Brightness Threshold (0-255)
                  <input type="number" id="cfgGlareThreshold" value="248" min="200" max="255" step="1">
                </label>
                <label>Doc Size Min (%)
                  <input type="number" id="cfgDocSize" value="30" min="1" max="100">
                </label>
                <label>Corner Margin (px)
                  <input type="number" id="cfgCornerMargin" value="10" min="0" max="100">
                </label>
              </div>
              <button id="applyConfigBtn" class="config-btn">Apply Settings</button>
            </details>
          </div>
        </div>
      </div>
      
      <div class="controls">
        <button id="startBtn">▶ Start Camera</button>
        <button id="stopBtn" disabled>⏹ Stop</button>
        <button id="captureBtn" disabled>📸 Manual Capture</button>
      </div>
    </div>
  </div>

  <!-- Load docuSnap (pure JS - no OpenCV needed!) -->
  <script src="../src/docusnap.js"></script>
  
  <script>
    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', async function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await initApp();
    });
    
    async function initApp() {
      console.log('initApp called');
      try {
        // Get DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const result = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const captureBtn = document.getElementById('captureBtn');
        const scoreEl = document.getElementById('score');
        const issuesEl = document.getElementById('issues');
        const issuesListEl = document.getElementById('issuesList');
        
        // Quality indicator elements
        const indSharpness = document.getElementById('indSharpness');
        const indSharpnessStatus = document.getElementById('indSharpnessStatus');
        const indBrightness = document.getElementById('indBrightness');
        const indBrightnessStatus = document.getElementById('indBrightnessStatus');
        const indGlare = document.getElementById('indGlare');
        const indGlareStatus = document.getElementById('indGlareStatus');
        const indDocSize = document.getElementById('indDocSize');
        const indDocSizeStatus = document.getElementById('indDocSizeStatus');
        const indCorners = document.getElementById('indCorners');
        const indCornersStatus = document.getElementById('indCornersStatus');
        
        // Config elements
        const cfgSharpness = document.getElementById('cfgSharpness');
        const cfgBrightnessMin = document.getElementById('cfgBrightnessMin');
        const cfgGlare = document.getElementById('cfgGlare');
        const cfgGlareThreshold = document.getElementById('cfgGlareThreshold');
        const cfgDocSize = document.getElementById('cfgDocSize');
        const cfgCornerMargin = document.getElementById('cfgCornerMargin');
        const applyConfigBtn = document.getElementById('applyConfigBtn');
        
        // Current thresholds (can be updated via config)
        // Note: config UI uses normalized 0-100, but thresholds use raw values internally
        let currentThresholds = {
          sharpnessMin: (50 / 100) * 219,    // UI 50 -> raw ~110
          brightnessMin: (50 / 100) * 178,   // UI 50 -> raw ~89
          glareMax: 0.10,                     // Fail if glare score > 10 (out of 100)
          glareThreshold: 248,               // Pixel brightness threshold for glare (248 = near-white only)
          documentSizeMin: 0.15,              // Lowered from 0.30 for easier detection
          cornerMarginPx: 10,
        };
        
        // Helper to update indicator
        function updateIndicator(valueEl, statusEl, value, pass, format = (v) => v.toFixed(1)) {
          valueEl.textContent = typeof value === 'number' ? format(value) : value;
          statusEl.textContent = pass ? '✅' : '❌';
        }
        
        // Detect capture capability
        const capability = CaptureCapability.detect();
        console.log('Capture capability:', capability, '| isWebView:', CaptureCapability.isWebView());

        // Create scanner instance and initialize
        const scanner = new docuSnap();
        await scanner.init();
        scanner._detector.debug = true;
        console.log('Scanner initialized');

        // ── Shared helpers ──────────────────────────────────────────────────

        /** Render a captured image into the result panel with a flash effect. */
        function showCaptureResult(imgSrc) {
          const img = new Image();
          img.onload = () => {
            result.innerHTML = '';
            result.appendChild(img);
            img.style.maxWidth = '100%';
            img.style.borderRadius = '4px';
          };
          img.src = imgSrc;
          result.style.boxShadow = '0 0 30px #2ed573';
          setTimeout(() => result.style.boxShadow = 'none', 500);
        }

        /**
         * Update all quality indicator widgets.
         * Used by both the live-stream and file-capture paths so the right-hand
         * panel always shows current quality data regardless of capture mode.
         */
        function handleQualityReport(report) {
          const passed = report.allPassed;
          scoreEl.textContent = passed ? '✅ Ready' : 'Adjusting...';
          scoreEl.style.color  = passed ? '#2ed573' : '#ff4757';

          const c = report.checks;

          // Sharpness: calibrated so raw ~110 → display 50
          const sharpnessNorm = Math.min(100, (c.sharpness.value / 219) * 100);
          updateIndicator(indSharpness, indSharpnessStatus,
            sharpnessNorm, c.sharpness.pass, v => v.toFixed(0));

          // Brightness: calibrated so raw ~125 (mid-grey) → display ~70
          const brightnessNorm = Math.min(100, (c.brightness.value / 178) * 100);
          updateIndicator(indBrightness, indBrightnessStatus,
            brightnessNorm, c.brightness.pass, v => v.toFixed(0));

          updateIndicator(indGlare, indGlareStatus,
            Math.min(100, Math.round(c.glare.value * 100)), c.glare.pass, v => v.toFixed(0));

          updateIndicator(indDocSize, indDocSizeStatus,
            c.documentSize.value * 100, c.documentSize.pass, v => v.toFixed(0) + '%');

          updateIndicator(indCorners, indCornersStatus,
            c.cornersFound.value ? (c.cornersWithinMargin.value ? 'OK' : 'Edge') : 'None',
            c.cornersFound.pass && c.cornersWithinMargin.pass,
            v => v);
        }

        // ── Fallback capture instance (created upfront; used in WebView mode  ──
        // ── and as a recovery path when getUserMedia fails at runtime)         ──
        const fallbackCapture = new DocumentCaptureFallback({
          scanner: scanner,
          containerElement: document.getElementById('fallbackContainer'),
          thresholds: currentThresholds,
          allowSkipQuality: true,
          onCapture: (captureResult) => {
            showCaptureResult(captureResult.extractedData || captureResult.imageData);
            console.log('Fallback captured! Extracted:', !!captureResult.extractedData);
          },
          onQualityReport: handleQualityReport,
        });

        /**
         * Switch to file-capture mode.
         * Called either at startup (WebView detected) or when getUserMedia fails
         * at runtime (e.g. permission denied, hardware unavailable).
         */
        function switchToFallback() {
          canvas.style.display = 'none';
          const fallbackEl = document.getElementById('fallbackContainer');
          fallbackEl.style.display = '';
          document.querySelector('.video-container').classList.add('fallback-mode');
          startBtn.style.display = 'none';
          stopBtn.style.display  = 'none';
          captureBtn.style.display = 'none';
          fallbackCapture.start();
        }

        // ── Live-stream auto-capture ────────────────────────────────────────
        const autoCapture = new DocumentAutoCapture({
          scanner: scanner,
          videoElement: video,
          canvasElement: canvas,
          consecutiveFramesNeeded: 5,
          stayStillDurationMs: 1000,
          frameIntervalMs: 66,   // ~15 FPS — fast enough with the 640px detection canvas
          thresholds: currentThresholds,
          onCapture: (captureResult) => {
            showCaptureResult(captureResult.extractedData || captureResult.imageData);
            console.log('Auto-captured! Extracted:', !!captureResult.extractedData);
          },
          onStateChange: (state, instruction) => {
            console.log('State:', state, instruction);
            if (state === 'detecting' || state === 'stay_still') {
              issuesEl.style.display = 'block';
              issuesListEl.innerHTML = `<li>${instruction}</li>`;
              issuesEl.className = state === 'stay_still' ? 'issues good' : 'issues';
            } else if (state === 'captured') {
              issuesEl.className = 'issues good';
              issuesListEl.innerHTML = '<li>✅ Document captured!</li>';
            }
          },
          onQualityReport: handleQualityReport,
        });

        // ── Config apply ────────────────────────────────────────────────────
        applyConfigBtn.addEventListener('click', () => {
          const sharpnessNorm    = parseFloat(cfgSharpness.value)     || 50;
          const brightnessMinNorm = parseFloat(cfgBrightnessMin.value) || 50;

          currentThresholds = {
            sharpnessMin:    (sharpnessNorm     / 100) * 219,
            brightnessMin:   (brightnessMinNorm / 100) * 178,
            glareMax:        (parseFloat(cfgGlare.value)          || 10)  / 100,
            glareThreshold:   parseFloat(cfgGlareThreshold.value) || 248,
            documentSizeMin: (parseFloat(cfgDocSize.value)         || 30)  / 100,
            cornerMarginPx:   parseFloat(cfgCornerMargin.value)   || 10,
          };
          autoCapture._thresholds    = currentThresholds;
          fallbackCapture._thresholds = currentThresholds;
          console.log('Thresholds updated:', currentThresholds);
          alert('Settings applied!');
        });

        // ── Initial routing ─────────────────────────────────────────────────
        if (capability === 'file') {
          switchToFallback();
        }

        // ── Button handlers (live-stream mode) ──────────────────────────────
        startBtn.addEventListener('click', async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false,
            });
            video.srcObject = stream;
            await video.play();

            // Canvas dimensions + aspect-ratio are now set by the library on the first
            // valid frame (at display resolution, not full camera resolution).
            autoCapture.start();
            startBtn.disabled  = true;
            stopBtn.disabled   = false;
            captureBtn.disabled = false;

          } catch (err) {
            // getUserMedia failed at runtime (permission denied, hardware busy, etc.)
            // — gracefully fall back to native camera via file input
            console.warn('getUserMedia failed (' + err.name + '); switching to file capture.');
            switchToFallback();
          }
        });

        stopBtn.addEventListener('click', () => {
          autoCapture.stop();
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
          }
          startBtn.disabled  = false;
          stopBtn.disabled   = true;
          captureBtn.disabled = true;
          scoreEl.textContent = '-';
          issuesEl.style.display = 'none';
        });

        captureBtn.addEventListener('click', () => {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width  = video.videoWidth;
          tempCanvas.height = video.videoHeight;
          tempCanvas.getContext('2d').drawImage(video, 0, 0);

          const img = new Image();
          img.onload = () => {
            result.innerHTML = '';
            result.appendChild(img);
            img.style.maxWidth = '100%';
          };
          img.src = tempCanvas.toDataURL('image/jpeg', 0.9);
        });

        console.log('initApp completed successfully');
      } catch (e) {
        console.error('initApp error:', e);
        alert('Initialization error: ' + e.message);
      }
    }
  </script>
</body>
